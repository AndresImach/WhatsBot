<!DOCTYPE html>
<html lang="es-AR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backoffice — Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif }
    html, body { height: 100% }
    body { background: #0b141a; color: #e9edef }

    /* ── Login ── */
    #login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px }
    #login form { background: #1f2c34; border: 1px solid #2a3942; border-radius: 14px; padding: 28px; width: 100%; max-width: 320px }
    #login h1 { font-size: 1.1rem; margin-bottom: 16px }
    #login input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #2a3942; background: #0b141a; color: #e9edef; font-size: .95rem; margin-bottom: 10px }
    #login button { width: 100%; background: #1FA855; color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: .9rem; font-weight: 600 }
    #login .err { color: #f2836b; font-size: .82rem; margin-bottom: 10px; min-height: 1em }

    /* ── App ── */
    #app { display: none; height: 100vh }
    .layout { display: flex; height: 100% }

    .sidebar { width: 340px; min-width: 260px; border-right: 1px solid #2a3942; display: flex; flex-direction: column }
    .sidebar header { padding: 14px 16px; border-bottom: 1px solid #2a3942; display: flex; align-items: center; gap: 8px }
    .sidebar header h1 { font-size: 1rem; flex: 1 }
    .sidebar header button.logout { background: none; border: none; color: #8aa0ad; cursor: pointer; font-size: .78rem }
    .tabs { display: flex; gap: 6px; padding: 10px 12px; border-bottom: 1px solid #2a3942 }
    .tabs button { flex: 1; background: #1f2c34; border: 1px solid #2a3942; color: #b8c4cc; padding: 7px; border-radius: 8px; cursor: pointer; font-size: .78rem }
    .tabs button.activo { background: #1FA855; border-color: #1FA855; color: #fff; font-weight: 600 }
    .lista { flex: 1; overflow-y: auto }
    .item { padding: 12px 16px; border-bottom: 1px solid #182229; cursor: pointer; display: flex; flex-direction: column; gap: 4px }
    .item:hover { background: #182229 }
    .item.sel { background: #1f2c34 }
    .item .fila1 { display: flex; align-items: center; gap: 8px }
    .item .nm { font-weight: 600; font-size: .92rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .item .num { color: #8aa0ad; font-size: .74rem }
    .badge { padding: 2px 8px; border-radius: 10px; font-weight: 700; font-size: .66rem; white-space: nowrap }
    .badge.humano { background: #3a2414; color: #f0a860 }
    .badge.bot { background: #14361f; color: #7fdca4 }
    .vacio { color: #8aa0ad; text-align: center; padding: 30px 16px; font-size: .85rem }

    .panel { flex: 1; display: flex; flex-direction: column; min-width: 0 }
    .panel header { padding: 14px 18px; border-bottom: 1px solid #2a3942; display: flex; align-items: center; gap: 10px }
    .panel header .nm { font-weight: 600 }
    .panel header .num { color: #8aa0ad; font-size: .78rem }
    .panel header .estado { margin-left: auto }
    .panel header button.resolver { background: #1f2c34; border: 1px solid #2a3942; color: #e9edef; padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: .8rem }

    .hilo { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 8px }
    .burbuja { max-width: 70%; padding: 8px 12px; border-radius: 12px; font-size: .9rem; line-height: 1.35; white-space: pre-wrap }
    .burbuja .hora { display: block; font-size: .66rem; color: rgba(255,255,255,.55); margin-top: 4px }
    .burbuja.user { align-self: flex-start; background: #1f2c34; border-bottom-left-radius: 2px }
    .burbuja.assistant { align-self: flex-end; background: #056162; border-bottom-right-radius: 2px }
    .burbuja.humano { align-self: flex-end; background: #1FA855; border-bottom-right-radius: 2px }
    .burbuja.humano::before { content: 'Vos'; display: block; font-size: .64rem; font-weight: 700; opacity: .8; margin-bottom: 2px }

    .compositor { border-top: 1px solid #2a3942; padding: 12px 16px; display: flex; gap: 10px }
    .compositor textarea { flex: 1; resize: none; height: 44px; padding: 10px 12px; border-radius: 10px; border: 1px solid #2a3942; background: #1f2c34; color: #e9edef; font-size: .9rem; font-family: inherit }
    .compositor button { background: #1FA855; color: #fff; border: none; padding: 0 18px; border-radius: 10px; cursor: pointer; font-size: .9rem; font-weight: 600 }
    .compositor button:disabled { opacity: .5; cursor: default }

    .sinSeleccion { flex: 1; display: flex; align-items: center; justify-content: center; color: #8aa0ad; font-size: .9rem }

    @media (max-width: 720px) {
      .sidebar { width: 100%; }
      .panel { display: none }
      .layout.viendo .sidebar { display: none }
      .layout.viendo .panel { display: flex }
      .panel header button.volver { display: inline-block !important }
    }
  </style>
</head>

<body>
  <div id="login">
    <form onsubmit="return login(event)">
      <h1>Backoffice — Demo</h1>
      <div class="err" id="loginErr"></div>
      <input type="password" id="loginPass" placeholder="Contraseña" autofocus>
      <button type="submit">Entrar</button>
    </form>
  </div>

  <div id="app">
    <div class="layout" id="layout">
      <div class="sidebar">
        <header>
          <h1>Conversaciones</h1>
          <button class="logout" onclick="logout()">Salir</button>
        </header>
        <div class="tabs">
          <button id="tabHumano" class="activo" onclick="cambiarTab('humano')">🙋 Esperan persona</button>
          <button id="tabTodas" onclick="cambiarTab(null)">Todas</button>
        </div>
        <div class="lista" id="lista"></div>
      </div>

      <div class="panel" id="panel">
        <div class="sinSeleccion" id="sinSeleccion">Elegí una conversación de la izquierda.</div>
      </div>
    </div>
  </div>

  <script>
    let convActual = null;
    let tabActual = 'humano';

    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;'); }
    function hora(ts) { return (ts || '').slice(0, 16).replace('T', ' '); }
    function corto(id) { return (id || '').slice(0, 8); }

    async function api(path, opts) {
      const r = await fetch(path, { ...opts, headers: { 'Content-Type': 'application/json', ...(opts && opts.headers) } });
      if (r.status === 401) { mostrarLogin(); throw new Error('no autorizado'); }
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
      return d;
    }

    function mostrarLogin() {
      document.getElementById('app').style.display = 'none';
      document.getElementById('login').style.display = 'flex';
    }
    function mostrarApp() {
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      cargarLista();
      if (!window._poll) window._poll = setInterval(() => { cargarLista(); if (convActual) actualizarHilo(convActual, true); }, 4000);
    }

    async function login(ev) {
      ev.preventDefault();
      const pass = document.getElementById('loginPass').value;
      const err = document.getElementById('loginErr');
      err.textContent = '';
      try {
        await api('/api/backoffice/login', { method: 'POST', body: JSON.stringify({ password: pass }) });
        mostrarApp();
      } catch (e) {
        err.textContent = e.message === 'no autorizado' ? 'Contraseña incorrecta.' : e.message;
      }
      return false;
    }
    async function logout() {
      try { await api('/api/backoffice/logout', { method: 'POST' }); } catch (e) {}
      clearInterval(window._poll); window._poll = null;
      convActual = null;
      mostrarLogin();
    }

    function cambiarTab(estado) {
      tabActual = estado;
      document.getElementById('tabHumano').classList.toggle('activo', estado === 'humano');
      document.getElementById('tabTodas').classList.toggle('activo', estado === null);
      cargarLista();
    }

    async function cargarLista() {
      let data;
      try {
        data = await api('/api/backoffice/conversaciones' + (tabActual ? ('?estado=' + tabActual) : ''));
      } catch (e) { return; }
      const lista = document.getElementById('lista');
      const convs = data.conversaciones || [];
      if (!convs.length) {
        lista.innerHTML = '<div class="vacio">' + (tabActual === 'humano' ? 'Ninguna conversación necesita una persona ahora mismo.' : 'Todavía no hay conversaciones.') + '</div>';
        return;
      }
      lista.innerHTML = convs.map((c) => `
        <div class="item ${c.convId === convActual ? 'sel' : ''}" onclick="seleccionar('${c.convId}')">
          <div class="fila1">
            <span class="nm">${esc(c.negocio) || 'demo'}</span>
            <span class="badge ${c.estado === 'humano' ? 'humano' : 'bot'}">${c.estado === 'humano' ? '🙋 Persona' : '🤖 Bot'}</span>
          </div>
          <span class="num">${corto(c.convId)}… · ${hora(c.updatedAt)}</span>
        </div>`).join('');
    }

    async function seleccionar(convId) {
      convActual = convId;
      document.getElementById('layout').classList.add('viendo');
      await cargarLista();
      renderPanel(convId);
      await actualizarHilo(convId);
    }

    function volver() {
      convActual = null;
      document.getElementById('layout').classList.remove('viendo');
    }

    // Arma el "cascarón" del panel (header + hilo vacío + compositor) UNA sola
    // vez por conversación seleccionada. El polling solo llama a actualizarHilo(),
    // que pisa el contenido del <div id="hilo"> pero nunca el compositor/textarea:
    // si reconstruyéramos todo el panel en cada refresco, se perdía lo que el
    // usuario estaba escribiendo (el <textarea> se recreaba de cero).
    function renderPanel(convId) {
      const panel = document.getElementById('panel');
      panel.innerHTML = `
        <header>
          <button class="volver" style="display:none" onclick="volver()">←</button>
          <div>
            <div class="nm">Conversación</div>
            <div class="num">${esc(convId)}</div>
          </div>
          <div class="estado" id="estadoHilo"></div>
          <button class="resolver" id="btnResolver" onclick="resolver()" style="display:none">✓ Devolver al bot</button>
        </header>
        <div class="hilo" id="hilo"></div>
        <div class="compositor">
          <textarea id="texto" placeholder="Escribí una respuesta…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviar('${convId}')}"></textarea>
          <button id="btnEnviar" onclick="enviar('${convId}')">Enviar</button>
        </div>`;
    }

    async function actualizarHilo(convId, silencioso) {
      let data;
      try {
        data = await api('/api/backoffice/mensajes?convId=' + encodeURIComponent(convId));
      } catch (e) { return; }
      const hilo = document.getElementById('hilo');
      if (!hilo) return; // cambiaste de conversación mientras esto estaba en vuelo
      const mensajes = data.mensajes || [];

      const yaAbajo = hilo.scrollHeight - hilo.scrollTop - hilo.clientHeight < 60;
      hilo.innerHTML = mensajes.map((m) => `
          <div class="burbuja ${m.rol}">${esc(m.contenido)}<span class="hora">${hora(m.ts)}</span></div>`).join('');
      if (!silencioso || yaAbajo) hilo.scrollTop = hilo.scrollHeight;

      // Estado (humano/bot) mostrado en el header, tomado de /conversaciones.
      try {
        const todas = await api('/api/backoffice/conversaciones');
        const conv = (todas.conversaciones || []).find((c) => c.convId === convId);
        if (conv) {
          document.getElementById('estadoHilo').innerHTML = `<span class="badge ${conv.estado === 'humano' ? 'humano' : 'bot'}">${conv.estado === 'humano' ? '🙋 Persona' : '🤖 Bot'}</span>`;
          document.getElementById('btnResolver').style.display = conv.estado === 'humano' ? 'inline-block' : 'none';
        }
      } catch (e) {}
    }

    async function enviar(convId) {
      const ta = document.getElementById('texto');
      const btn = document.getElementById('btnEnviar');
      const texto = ta.value.trim();
      if (!texto) return;
      btn.disabled = true;
      try {
        await api('/api/backoffice/responder', { method: 'POST', body: JSON.stringify({ convId, texto }) });
        ta.value = '';
        await actualizarHilo(convId);
        await cargarLista();
      } catch (e) {
        alert('No se pudo enviar: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function resolver() {
      if (!convActual) return;
      try {
        await api('/api/backoffice/resolver', { method: 'POST', body: JSON.stringify({ convId: convActual }) });
        await actualizarHilo(convActual);
        await cargarLista();
      } catch (e) {
        alert('No se pudo actualizar: ' + e.message);
      }
    }

    // ¿Ya había una sesión activa? probamos pegándole a conversaciones.
    api('/api/backoffice/conversaciones?estado=humano').then(mostrarApp).catch(() => {});
  </script>
</body>

</html>
