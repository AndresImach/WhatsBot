<!DOCTYPE html>
<html lang="es-AR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backoffice — Demo</title>
  <link rel="stylesheet" href="/formato-whatsapp.css">
  <!-- Los negocios viven en negocios.js. El backoffice se abre para UNO con
       ?n=<clave> (ej: /backoffice?n=sunstar) y muestra solo SUS conversaciones.
       Sin ?n= (y sin ?todas=1) se muestra un selector de negocios. -->
  <script src="negocios.js"></script>
  <script src="/formato-whatsapp.js"></script>
  <script>
    // Negocio de este backoffice, tomado de la URL. Si la clave no existe en
    // NEGOCIOS, queda como null (cae al selector). ?todas=1 fuerza la vista con
    // TODOS los negocios juntos (la de antes de separar por negocio).
    const _params = new URLSearchParams(location.search);
    const _slug = _params.get('n');
    const NEGOCIO = _slug && NEGOCIOS[_slug] ? NEGOCIOS[_slug] : null;
    const NEGOCIO_SLUG = NEGOCIO ? _slug : null;
    const VER_TODAS = _params.get('todas') === '1';
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif }
    html, body { height: 100% }
    body { background: #0b141a; color: #e9edef }

    /* ── Login ── */
    #login { display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 16px }
    #login form { background: #1f2c34; border: 1px solid #2a3942; border-radius: 14px; padding: 28px; width: 100%; max-width: 320px }
    #login h1 { font-size: 1.1rem; margin-bottom: 16px }
    #login input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #2a3942; background: #0b141a; color: #e9edef; font-size: .95rem; margin-bottom: 10px }
    #login button { width: 100%; background: #1FA855; color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: .9rem; font-weight: 600 }
    #login .err { color: #f2836b; font-size: .82rem; margin-bottom: 10px; min-height: 1em }

    /* ── Selector de negocio (cuando no hay ?n= en la URL) ── */
    #chooser { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 32px 16px }
    #chooser h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; text-align: center }
    #chooser p.sub { color: #8aa0ad; font-size: .9rem; margin-bottom: 28px; text-align: center }
    #chooser .list { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 12px }
    #chooser a.card { display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit; background: #1f2c34; border: 1px solid #2a3942; border-radius: 14px; padding: 14px 16px; transition: background .15s, border-color .15s }
    #chooser a.card:hover { background: #2a3942; border-color: #1FA855 }
    #chooser a.card.todas { border-style: dashed }
    #chooser .av { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg, #1FA855, #0e6b3a); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; flex-shrink: 0 }
    #chooser .info { flex: 1; min-width: 0 }
    #chooser .nm { font-weight: 600; font-size: 1rem }
    #chooser .arrow { color: #1FA855; font-size: 1.4rem; flex-shrink: 0 }

    /* ── App ── */
    #app { display: none; height: 100vh }
    .layout { display: flex; height: 100% }

    .sidebar { width: 360px; min-width: 280px; border-right: 1px solid #2a3942; display: flex; flex-direction: column }
    .sidebar header { padding: 14px 16px; border-bottom: 1px solid #2a3942; display: flex; align-items: center; gap: 8px }
    .sidebar header .quien { flex: 1; min-width: 0 }
    .sidebar header h1 { font-size: .95rem }
    .sidebar header .yo { color: #8aa0ad; font-size: .74rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .sidebar header button.logout { background: none; border: none; color: #8aa0ad; cursor: pointer; font-size: .78rem }
    .tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 12px; border-bottom: 1px solid #2a3942 }
    .tabs button { flex: 1; min-width: 80px; background: #1f2c34; border: 1px solid #2a3942; color: #b8c4cc; padding: 7px; border-radius: 8px; cursor: pointer; font-size: .76rem }
    .tabs button.activo { background: #1FA855; border-color: #1FA855; color: #fff; font-weight: 600 }
    .filtros { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid #2a3942 }
    .filtros select, .filtros input { flex: 1; background: #1f2c34; border: 1px solid #2a3942; color: #e9edef; padding: 6px 8px; border-radius: 8px; font-size: .76rem; min-width: 0 }
    .lista { flex: 1; overflow-y: auto }
    .item { padding: 12px 16px; border-bottom: 1px solid #182229; cursor: pointer; display: flex; flex-direction: column; gap: 5px }
    .item:hover { background: #182229 }
    .item.sel { background: #1f2c34 }
    .item .fila1 { display: flex; align-items: center; gap: 8px }
    .item .nm { font-weight: 600; font-size: .92rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .item .num { color: #8aa0ad; font-size: .74rem }
    .item .fila3 { display: flex; flex-wrap: wrap; gap: 4px }
    .badge { padding: 2px 8px; border-radius: 10px; font-weight: 700; font-size: .66rem; white-space: nowrap }
    .badge.humano { background: #3a2414; color: #f0a860 }
    .badge.bot { background: #14361f; color: #7fdca4 }
    .badge.negocio { background: #1c2b33; color: #7fc8dc }
    .badge.asignado { background: #241c3a; color: #b39ef0 }
    .badge.valPos { background: #14361f; color: #7fdca4 }
    .badge.valNeg { background: #3a1420; color: #f2708f }
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: .66rem; background: #2a3942; color: #d5dde1 }
    .chip button { background: none; border: none; color: inherit; cursor: pointer; font-size: .8rem; line-height: 1; padding: 0 }
    .vacio { color: #8aa0ad; text-align: center; padding: 30px 16px; font-size: .85rem }

    .panel { flex: 1; display: flex; flex-direction: column; min-width: 0 }
    .panel header { padding: 12px 18px; border-bottom: 1px solid #2a3942; display: flex; align-items: center; gap: 10px; flex-wrap: wrap }
    .panel header .nm { font-weight: 600 }
    .panel header .num { color: #8aa0ad; font-size: .78rem }
    .panel header .estados { display: flex; gap: 6px; align-items: center; flex-wrap: wrap }
    .panel header .acciones { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap }
    .panel header select { background: #1f2c34; border: 1px solid #2a3942; color: #e9edef; padding: 6px 8px; border-radius: 8px; font-size: .78rem }
    .panel header button.resolver { background: #1f2c34; border: 1px solid #2a3942; color: #e9edef; padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: .8rem }
    .panel header button.thumb { background: #1f2c34; border: 1px solid #2a3942; color: #e9edef; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: .95rem; opacity: .55 }
    .panel header button.thumb:hover { opacity: .85 }
    .panel header button.thumb.activo.pos { background: #14361f; border-color: #1FA855; opacity: 1 }
    .panel header button.thumb.activo.neg { background: #3a1420; border-color: #f2708f; opacity: 1 }
    .etiquetasFila { padding: 8px 18px; border-bottom: 1px solid #2a3942; display: flex; gap: 6px; flex-wrap: wrap; align-items: center }
    .etiquetasFila input { background: #1f2c34; border: 1px solid #2a3942; color: #e9edef; padding: 4px 8px; border-radius: 10px; font-size: .72rem; width: 110px }

    .subtabs { display: flex; gap: 4px; padding: 8px 18px 0 }
    .subtabs button { background: none; border: none; border-bottom: 2px solid transparent; color: #8aa0ad; padding: 6px 10px; cursor: pointer; font-size: .8rem }
    .subtabs button.activo { color: #e9edef; border-color: #1FA855; font-weight: 600 }

    .hilo { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 8px }
    .burbuja { max-width: 70%; padding: 8px 12px; border-radius: 12px; font-size: .9rem; line-height: 1.35; white-space: pre-wrap }
    .burbuja .hora { display: block; font-size: .66rem; color: rgba(255,255,255,.55); margin-top: 4px }
    .burbuja.user { align-self: flex-start; background: #1f2c34; border-bottom-left-radius: 2px }
    .burbuja.assistant { align-self: flex-end; background: #056162; border-bottom-right-radius: 2px }
    .burbuja.humano { align-self: flex-end; background: #1FA855; border-bottom-right-radius: 2px }
    .burbuja.humano::before { content: 'Vos'; display: block; font-size: .64rem; font-weight: 700; opacity: .8; margin-bottom: 2px }

    .notas { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px }
    .nota { background: #2a2314; border: 1px solid #4a3a1a; border-radius: 10px; padding: 8px 12px; font-size: .86rem }
    .nota .meta { font-size: .68rem; color: #d8b878; margin-bottom: 3px; font-weight: 600 }
    .notaForm { border-top: 1px solid #2a3942; padding: 12px 16px; display: flex; gap: 10px }
    .notaForm textarea { flex: 1; resize: none; height: 40px; padding: 8px 10px; border-radius: 10px; border: 1px solid #4a3a1a; background: #1f2c34; color: #e9edef; font-size: .86rem; font-family: inherit }
    .notaForm button { background: #8a6d1f; color: #fff; border: none; padding: 0 16px; border-radius: 10px; cursor: pointer; font-size: .86rem; font-weight: 600 }

    .compositor { border-top: 1px solid #2a3942; padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; position: relative }
    .compositor textarea { flex: 1; resize: none; height: 44px; padding: 10px 12px; border-radius: 10px; border: 1px solid #2a3942; background: #1f2c34; color: #e9edef; font-size: .9rem; font-family: inherit }
    .compositor button.enviar { background: #1FA855; color: #fff; border: none; padding: 0 18px; height: 44px; border-radius: 10px; cursor: pointer; font-size: .9rem; font-weight: 600 }
    .compositor button.enviar:disabled { opacity: .5; cursor: default }
    .compositor button.rayo { background: #1f2c34; border: 1px solid #2a3942; color: #e9edef; width: 44px; height: 44px; border-radius: 10px; cursor: pointer; font-size: 1rem }

    .atajosPop { position: absolute; bottom: 58px; left: 16px; width: 320px; max-height: 280px; overflow-y: auto; background: #1f2c34; border: 1px solid #2a3942; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.4); display: none; z-index: 20 }
    .atajosPop.abierto { display: block }
    .atajosPop .fila { padding: 9px 12px; border-bottom: 1px solid #182229; cursor: pointer }
    .atajosPop .fila:hover { background: #182229 }
    .atajosPop .fila .clave { font-weight: 600; font-size: .8rem; color: #7fdca4 }
    .atajosPop .fila .texto { font-size: .76rem; color: #b8c4cc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .atajosPop .gestionar { padding: 9px 12px; text-align: center; font-size: .76rem; color: #8aa0ad; cursor: pointer }
    .atajosPop .gestionar:hover { color: #e9edef }

    .sinSeleccion { flex: 1; display: flex; align-items: center; justify-content: center; color: #8aa0ad; font-size: .9rem }

    /* ── Modal de atajos ── */
    .modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); align-items: center; justify-content: center; z-index: 50; padding: 16px }
    .modalOverlay.abierto { display: flex }
    .modal { background: #1f2c34; border: 1px solid #2a3942; border-radius: 14px; padding: 20px; width: 100%; max-width: 420px; max-height: 80vh; display: flex; flex-direction: column; gap: 12px }
    .modal h2 { font-size: 1rem }
    .modal .listaAtajos { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 6px; max-height: 260px }
    .modal .atajoRow { display: flex; align-items: center; gap: 8px; background: #182229; border-radius: 8px; padding: 7px 10px }
    .modal .atajoRow .clave { font-weight: 600; font-size: .8rem; color: #7fdca4; white-space: nowrap }
    .modal .atajoRow .neg { font-size: .64rem; color: #7fc8dc; white-space: nowrap }
    .modal .atajoRow .texto { flex: 1; font-size: .78rem; color: #b8c4cc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .modal .atajoRow button { background: none; border: none; color: #f2836b; cursor: pointer; font-size: .9rem }
    .modal form { display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #2a3942; padding-top: 12px }
    .modal input, .modal select { background: #0b141a; border: 1px solid #2a3942; color: #e9edef; padding: 8px 10px; border-radius: 8px; font-size: .85rem }
    .modal .filaBotones { display: flex; gap: 8px }
    .modal .filaBotones button { flex: 1; padding: 8px; border-radius: 8px; border: none; cursor: pointer; font-size: .85rem; font-weight: 600 }
    .modal .guardar { background: #1FA855; color: #fff }
    .modal .cancelar { background: #2a3942; color: #e9edef }

    @media (max-width: 720px) {
      .sidebar { width: 100%; }
      .panel { display: none }
      .layout.viendo .sidebar { display: none }
      .layout.viendo .panel { display: flex }
      .panel header button.volver { display: inline-block !important }
    }
  </style>
</head>

<body>
  <div id="chooser">
    <h1>Backoffice</h1>
    <p class="sub">Elegí el negocio cuyas conversaciones querés atender.</p>
    <div class="list" id="chooserList"></div>
  </div>

  <div id="login">
    <form onsubmit="return login(event)">
      <h1 id="loginTitulo">Backoffice — Demo</h1>
      <div class="err" id="loginErr"></div>
      <input type="text" id="loginUsuario" placeholder="Usuario" autofocus autocomplete="username">
      <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
  </div>

  <div id="app">
    <div class="layout" id="layout">
      <div class="sidebar">
        <header>
          <div class="quien">
            <h1 id="appTitulo">Conversaciones</h1>
            <div class="yo" id="yo"></div>
          </div>
          <button class="logout" onclick="logout()">Salir</button>
        </header>
        <div class="tabs">
          <button id="tabHumano" class="activo" onclick="cambiarTab('humano')">🙋 Esperan persona</button>
          <button id="tabMias" onclick="cambiarTab('mias')">Mías</button>
          <button id="tabSinAsignar" onclick="cambiarTab('sin_asignar')">Sin asignar</button>
          <button id="tabTodas" onclick="cambiarTab(null)">Todas</button>
        </div>
        <div class="filtros" id="filtrosFila">
          <!-- El filtro de negocio solo se arma (en JS) cuando VER_TODAS es true. -->
          <input id="filtroEtiqueta" list="etiquetasConocidas" placeholder="Filtrar por etiqueta…" oninput="cambiarEtiqueta(this.value)">
          <datalist id="etiquetasConocidas"></datalist>
        </div>
        <div class="lista" id="lista"></div>
      </div>

      <div class="panel" id="panel">
        <div class="sinSeleccion" id="sinSeleccion">Elegí una conversación de la izquierda.</div>
      </div>
    </div>
  </div>

  <div class="modalOverlay" id="modalAtajos">
    <div class="modal">
      <h2>Respuestas rápidas</h2>
      <div class="listaAtajos" id="listaAtajosModal"></div>
      <form onsubmit="return crearAtajoUI(event)">
        <input id="nuevaClave" placeholder="Clave (ej: horario)" maxlength="40">
        <input id="nuevoTexto" placeholder="Texto de la respuesta">
        <select id="nuevoNegocioAtajo"></select>
        <div class="filaBotones">
          <button type="button" class="cancelar" onclick="cerrarAtajos()">Cerrar</button>
          <button type="submit" class="guardar">Agregar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let agenteActual = null;
    let convActual = null;
    let convNegocioActual = null; // negocio de la conversación seleccionada (para scopear atajos en la vista "Todas")
    let tabActual = 'humano';
    let negocioFiltro = '';
    let etiquetaFiltro = '';
    let panelTab = 'hilo';
    let agentesCache = [];
    let atajosCache = null;
    let atajosCacheNegocio = undefined; // negocio con el que se cargó atajosCache, para saber cuándo refrescar
    const etiquetasConocidas = new Set();

    // Título según el negocio (o "Todas" / selector). NEGOCIO/NEGOCIO_SLUG/VER_TODAS
    // se resolvieron en el <head> a partir de la URL.
    const tituloNegocio = NEGOCIO ? NEGOCIO.nombre : (VER_TODAS ? 'Todas las conversaciones' : 'Demo');
    document.getElementById('loginTitulo').textContent = 'Backoffice — ' + tituloNegocio;
    document.getElementById('appTitulo').textContent = tituloNegocio;
    document.title = 'Backoffice — ' + tituloNegocio;

    // Arma el querystring de /conversaciones sumando SIEMPRE el negocio de este
    // backoffice (si lo hay), así cada negocio ve solo lo suyo. En la vista
    // "Todas" (VER_TODAS) no se filtra por negocio salvo que se elija en el filtro.
    function qsConversaciones(extra) {
      const p = new URLSearchParams();
      if (NEGOCIO_SLUG) p.set('negocio', NEGOCIO_SLUG);
      for (const [k, v] of Object.entries(extra || {})) if (v) p.set(k, v);
      const s = p.toString();
      return s ? ('?' + s) : '';
    }

    function extraFiltros() {
      const extra = {};
      if (tabActual === 'humano') extra.estado = 'humano';
      else if (tabActual === 'mias') extra.asignado = 'mias';
      else if (tabActual === 'sin_asignar') extra.asignado = 'sin_asignar';
      if (VER_TODAS && negocioFiltro) extra.negocio = negocioFiltro;
      if (etiquetaFiltro) extra.etiqueta = etiquetaFiltro;
      return extra;
    }

    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;'); }
    function hora(ts) { return (ts || '').slice(0, 16).replace('T', ' '); }
    function corto(id) { return (id || '').slice(0, 8); }
    // Nombre lindo del negocio a partir de su clave (ej: 'sunstar' → 'Sunstar Cinemas · Tucumán').
    function nombreNegocio(slug) { return (NEGOCIOS[slug] && NEGOCIOS[slug].nombre) || slug || 'demo'; }
    function etiquetasDe(c) { return (c.etiquetas || '').split(',').map((t) => t.trim()).filter(Boolean); }

    async function api(path, opts) {
      const r = await fetch(path, { ...opts, headers: { 'Content-Type': 'application/json', ...(opts && opts.headers) } });
      if (r.status === 401) { mostrarLogin(); throw new Error('no autorizado'); }
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
      return d;
    }

    function mostrarLogin() {
      document.getElementById('chooser').style.display = 'none';
      document.getElementById('app').style.display = 'none';
      document.getElementById('login').style.display = 'flex';
      clearInterval(window._poll); window._poll = null;
    }
    async function mostrarApp(agente) {
      agenteActual = agente;
      document.getElementById('chooser').style.display = 'none';
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('yo').textContent = 'Vos: ' + (agente.nombre || agente.usuario);
      montarFiltroNegocio();
      try { agentesCache = (await api('/api/backoffice/agentes')).agentes || []; } catch (e) {}
      cargarLista();
      if (!window._poll) window._poll = setInterval(() => { cargarLista(); if (convActual) actualizarHilo(convActual, true); }, 4000);
    }

    // Selector de negocio: se muestra cuando la URL no trae ?n=<clave> válida
    // ni ?todas=1. Cada tarjeta abre el backoffice de ese negocio; abajo, una
    // opción para ver todas las conversaciones juntas.
    function mostrarChooser() {
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'none';
      const cont = document.getElementById('chooser');
      const lista = document.getElementById('chooserList');
      lista.innerHTML = Object.entries(NEGOCIOS).map(([slug, n]) => `
        <a class="card" href="backoffice.html?n=${encodeURIComponent(slug)}">
          <div class="av">${esc(n.avatar)}</div>
          <div class="info"><div class="nm">${esc(n.nombre)}</div></div>
          <div class="arrow">›</div>
        </a>`).join('') + `
        <a class="card todas" href="backoffice.html?todas=1">
          <div class="av">📋</div>
          <div class="info"><div class="nm">Todas las conversaciones</div></div>
          <div class="arrow">›</div>
        </a>`;
      cont.style.display = 'flex';
    }

    // Filtro de negocio en el sidebar: solo tiene sentido en la vista "Todas"
    // (en el backoffice de UN negocio ya está fijo por la URL).
    function montarFiltroNegocio() {
      if (!VER_TODAS) return;
      const fila = document.getElementById('filtrosFila');
      const sel = document.createElement('select');
      sel.id = 'filtroNegocio';
      sel.onchange = () => cambiarNegocio(sel.value);
      sel.innerHTML = '<option value="">Todos los negocios</option>' +
        Object.entries(NEGOCIOS).map(([slug, n]) => `<option value="${esc(slug)}">${esc(n.nombre)}</option>`).join('');
      fila.insertBefore(sel, fila.firstChild);
    }

    async function login(ev) {
      ev.preventDefault();
      const usuario = document.getElementById('loginUsuario').value;
      const pass = document.getElementById('loginPass').value;
      const err = document.getElementById('loginErr');
      err.textContent = '';
      try {
        const d = await api('/api/backoffice/login', { method: 'POST', body: JSON.stringify({ usuario, password: pass }) });
        mostrarApp(d.agente);
      } catch (e) {
        err.textContent = e.message === 'no autorizado' ? 'Usuario o contraseña incorrectos.' : e.message;
      }
      return false;
    }
    async function logout() {
      try { await api('/api/backoffice/logout', { method: 'POST' }); } catch (e) {}
      clearInterval(window._poll); window._poll = null;
      convActual = null;
      mostrarLogin();
    }

    function cambiarTab(estado) {
      tabActual = estado;
      ['tabHumano', 'tabMias', 'tabSinAsignar', 'tabTodas'].forEach((id) => document.getElementById(id).classList.remove('activo'));
      const map = { humano: 'tabHumano', mias: 'tabMias', sin_asignar: 'tabSinAsignar' };
      document.getElementById(map[estado] || 'tabTodas').classList.add('activo');
      cargarLista();
    }
    function cambiarNegocio(v) { negocioFiltro = v; cargarLista(); }
    function cambiarEtiqueta(v) { etiquetaFiltro = v.trim(); cargarLista(); }

    async function cargarLista() {
      let data;
      try {
        data = await api('/api/backoffice/conversaciones' + qsConversaciones(extraFiltros()));
      } catch (e) {
        document.getElementById('lista').innerHTML = '<div class="vacio">⚠️ ' + esc(e.message) + '</div>';
        return;
      }
      const lista = document.getElementById('lista');
      const convs = data.conversaciones || [];
      let cambioEtiqueta = false;
      convs.forEach((c) => etiquetasDe(c).forEach((t) => { if (!etiquetasConocidas.has(t)) { etiquetasConocidas.add(t); cambioEtiqueta = true; } }));
      if (cambioEtiqueta) {
        document.getElementById('etiquetasConocidas').innerHTML = [...etiquetasConocidas].map((t) => `<option value="${esc(t)}">`).join('');
      }
      if (!convs.length) {
        lista.innerHTML = '<div class="vacio">' + (tabActual === 'humano' ? 'Ninguna conversación necesita una persona ahora mismo.' : 'No hay conversaciones con este filtro.') + '</div>';
        return;
      }
      // En el backoffice de un solo negocio, la cabecera ya dice de qué negocio
      // es: cada fila lidera con el id de conversación. En la vista "Todas",
      // cada fila muestra a qué negocio pertenece.
      lista.innerHTML = convs.map((c) => `
        <div class="item ${c.convId === convActual ? 'sel' : ''}" onclick="seleccionar('${c.convId}', '${esc(c.negocio || '')}')">
          <div class="fila1">
            <span class="nm">${NEGOCIO_SLUG ? ('Conversación ' + corto(c.convId)) : esc(nombreNegocio(c.negocio))}</span>
            <span class="badge ${c.estado === 'humano' ? 'humano' : 'bot'}">${c.estado === 'humano' ? '🙋 Persona' : '🤖 Bot'}</span>
            ${c.valoracion === 'positiva' ? '<span class="badge valPos">👍</span>' : c.valoracion === 'negativa' ? '<span class="badge valNeg">👎</span>' : ''}
          </div>
          <span class="num">${corto(c.convId)}… · ${hora(c.updatedAt)}</span>
          <div class="fila3">
            ${!NEGOCIO_SLUG && c.negocio ? `<span class="badge negocio">${esc(nombreNegocio(c.negocio))}</span>` : ''}
            ${c.asignadoNombre ? `<span class="badge asignado">👤 ${esc(c.asignadoNombre)}</span>` : ''}
            ${etiquetasDe(c).map((t) => `<span class="chip">${esc(t)}</span>`).join('')}
          </div>
        </div>`).join('');
    }

    async function seleccionar(convId, negocio) {
      convActual = convId;
      convNegocioActual = negocio || NEGOCIO_SLUG || null;
      panelTab = 'hilo';
      document.getElementById('layout').classList.add('viendo');
      await cargarLista();
      renderPanel(convId);
      await actualizarHilo(convId);
    }

    function volver() {
      convActual = null;
      document.getElementById('layout').classList.remove('viendo');
    }

    function cambiarPanelTab(tab) {
      panelTab = tab;
      document.getElementById('subtabHilo').classList.toggle('activo', tab === 'hilo');
      document.getElementById('subtabNotas').classList.toggle('activo', tab === 'notas');
      document.getElementById('hilo').style.display = tab === 'hilo' ? 'flex' : 'none';
      document.getElementById('compositor').style.display = tab === 'hilo' ? 'flex' : 'none';
      document.getElementById('bloqueNotas').style.display = tab === 'notas' ? 'flex' : 'none';
      if (tab === 'notas') cargarNotas(convActual);
    }

    // Arma el "cascarón" del panel (header + hilo vacío + compositor) UNA sola
    // vez por conversación seleccionada. El polling solo llama a actualizarHilo(),
    // que pisa el contenido del <div id="hilo"> pero nunca el compositor/textarea:
    // si reconstruyéramos todo el panel en cada refresco, se perdía lo que el
    // usuario estaba escribiendo (el <textarea> se recreaba de cero).
    function renderPanel(convId) {
      const panel = document.getElementById('panel');
      const opcionesAgentes = agentesCache.map((a) => `<option value="${a.id}">${esc(a.nombre)}</option>`).join('');
      panel.innerHTML = `
        <header>
          <button class="volver" style="display:none" onclick="volver()">←</button>
          <div>
            <div class="nm">Conversación</div>
            <div class="num">${esc(convId)}</div>
          </div>
          <div class="estados" id="estadoHilo"></div>
          <div class="acciones">
            <select id="selAsignado" onchange="cambiarAsignacion(this.value)">
              <option value="">Sin asignar</option>
              ${opcionesAgentes}
            </select>
            <button class="thumb pos" id="btnPos" onclick="valorar('${convId}','positiva')" title="El bot resolvió bien esta conversación">👍</button>
            <button class="thumb neg" id="btnNeg" onclick="valorar('${convId}','negativa')" title="El bot resolvió mal esta conversación">👎</button>
            <button class="resolver" id="btnResolver" onclick="resolver()" style="display:none">✓ Devolver al bot</button>
          </div>
        </header>
        <div class="etiquetasFila" id="etiquetasFila"></div>
        <div class="subtabs">
          <button id="subtabHilo" class="activo" onclick="cambiarPanelTab('hilo')">Conversación</button>
          <button id="subtabNotas" onclick="cambiarPanelTab('notas')">📝 Notas</button>
        </div>
        <div class="hilo" id="hilo"></div>
        <div class="compositor" id="compositor" style="position:relative">
          <button type="button" class="rayo" onclick="toggleAtajos()" title="Respuestas rápidas">⚡</button>
          <div class="atajosPop" id="atajosPop"></div>
          <textarea id="texto" placeholder="Escribí una respuesta…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviar('${convId}')}"></textarea>
          <button class="enviar" id="btnEnviar" onclick="enviar('${convId}')">Enviar</button>
        </div>
        <div class="notas" id="bloqueNotas" style="display:none; flex-direction:column"></div>
        <div class="notaForm" id="notaForm" style="display:none">
          <textarea id="textoNota" placeholder="Nota interna (no la ve el cliente)…"></textarea>
          <button onclick="agregarNotaUI('${convId}')">Guardar</button>
        </div>`;
    }

    async function actualizarHilo(convId, silencioso) {
      let data;
      try {
        data = await api('/api/backoffice/mensajes?convId=' + encodeURIComponent(convId));
      } catch (e) { return; }
      const hilo = document.getElementById('hilo');
      if (!hilo) return; // cambiaste de conversación mientras esto estaba en vuelo
      const mensajes = data.mensajes || [];

      const yaAbajo = hilo.scrollHeight - hilo.scrollTop - hilo.clientHeight < 60;
      hilo.innerHTML = mensajes.map((m) => `
          <div class="burbuja wa-text ${m.rol}">${formatearWhatsApp(m.contenido)}<span class="hora">${hora(m.ts)}</span></div>`).join('');
      if (!silencioso || yaAbajo) hilo.scrollTop = hilo.scrollHeight;

      // Estado, asignación y etiquetas mostrados en el header, tomados de /conversaciones.
      try {
        const todas = await api('/api/backoffice/conversaciones' + qsConversaciones({}));
        const conv = (todas.conversaciones || []).find((c) => c.convId === convId);
        if (conv) renderHeaderExtra(conv);
      } catch (e) {}
    }

    function renderHeaderExtra(conv) {
      const estadoHilo = document.getElementById('estadoHilo');
      const btnResolver = document.getElementById('btnResolver');
      const selAsignado = document.getElementById('selAsignado');
      const etiquetasFila = document.getElementById('etiquetasFila');
      if (!estadoHilo || !selAsignado || !etiquetasFila) return;

      estadoHilo.innerHTML = `<span class="badge ${conv.estado === 'humano' ? 'humano' : 'bot'}">${conv.estado === 'humano' ? '🙋 Persona' : '🤖 Bot'}</span>` +
        (!NEGOCIO_SLUG && conv.negocio ? `<span class="badge negocio">${esc(nombreNegocio(conv.negocio))}</span>` : '');
      btnResolver.style.display = conv.estado === 'humano' ? 'inline-block' : 'none';
      if (document.activeElement !== selAsignado) selAsignado.value = conv.asignadoA || '';

      const btnPos = document.getElementById('btnPos');
      const btnNeg = document.getElementById('btnNeg');
      if (btnPos && btnNeg) {
        btnPos.classList.toggle('activo', conv.valoracion === 'positiva');
        btnNeg.classList.toggle('activo', conv.valoracion === 'negativa');
      }

      const chips = etiquetasDe(conv).map((t) => `<span class="chip">${esc(t)} <button onclick="quitarEtiqueta('${esc(conv.convId)}','${esc(t)}')">×</button></span>`).join('');
      etiquetasFila.innerHTML = chips + `<input list="etiquetasConocidas" placeholder="+ etiqueta" onkeydown="if(event.key==='Enter'){event.preventDefault();agregarEtiqueta('${esc(conv.convId)}', this.value); this.value='';}">`;
    }

    async function cambiarAsignacion(valor) {
      if (!convActual) return;
      try {
        await api('/api/backoffice/asignar', { method: 'POST', body: JSON.stringify({ convId: convActual, agenteId: valor ? Number(valor) : null }) });
        await cargarLista();
        await actualizarHilo(convActual, true);
      } catch (e) {
        alert('No se pudo asignar: ' + e.message);
      }
    }

    async function agregarEtiqueta(convId, valor) {
      const t = (valor || '').trim();
      if (!t || convId !== convActual) return;
      // Releemos del server para no pisar etiquetas agregadas por otro agente mientras tanto.
      try {
        const todas = await api('/api/backoffice/conversaciones' + qsConversaciones({}));
        const conv = (todas.conversaciones || []).find((c) => c.convId === convId);
        const set = new Set(etiquetasDe(conv || {}));
        set.add(t);
        await api('/api/backoffice/etiquetas', { method: 'POST', body: JSON.stringify({ convId, etiquetas: [...set] }) });
        await cargarLista();
        await actualizarHilo(convId, true);
      } catch (e) {
        alert('No se pudo guardar la etiqueta: ' + e.message);
      }
    }

    async function quitarEtiqueta(convId, etiqueta) {
      try {
        const todas = await api('/api/backoffice/conversaciones' + qsConversaciones({}));
        const conv = (todas.conversaciones || []).find((c) => c.convId === convId);
        const restantes = etiquetasDe(conv || {}).filter((t) => t !== etiqueta);
        await api('/api/backoffice/etiquetas', { method: 'POST', body: JSON.stringify({ convId, etiquetas: restantes }) });
        await cargarLista();
        await actualizarHilo(convId, true);
      } catch (e) {
        alert('No se pudo quitar la etiqueta: ' + e.message);
      }
    }

    async function cargarNotas(convId) {
      const bloque = document.getElementById('bloqueNotas');
      const form = document.getElementById('notaForm');
      if (!bloque) return;
      form.style.display = 'flex';
      let data;
      try {
        data = await api('/api/backoffice/notas?convId=' + encodeURIComponent(convId));
      } catch (e) { return; }
      const notas = data.notas || [];
      bloque.innerHTML = notas.length
        ? notas.map((n) => `<div class="nota"><div class="meta">${esc(n.agenteNombre) || '—'} · ${hora(n.ts)}</div>${esc(n.texto)}</div>`).join('')
        : '<div class="vacio">Todavía no hay notas en esta conversación.</div>';
      bloque.scrollTop = bloque.scrollHeight;
    }

    async function agregarNotaUI(convId) {
      const ta = document.getElementById('textoNota');
      const texto = ta.value.trim();
      if (!texto) return;
      try {
        await api('/api/backoffice/notas', { method: 'POST', body: JSON.stringify({ convId, texto }) });
        ta.value = '';
        await cargarNotas(convId);
      } catch (e) {
        alert('No se pudo guardar la nota: ' + e.message);
      }
    }

    async function enviar(convId) {
      const ta = document.getElementById('texto');
      const btn = document.getElementById('btnEnviar');
      const texto = ta.value.trim();
      if (!texto) return;
      btn.disabled = true;
      try {
        await api('/api/backoffice/responder', { method: 'POST', body: JSON.stringify({ convId, texto }) });
        ta.value = '';
        await actualizarHilo(convId);
        await cargarLista();
      } catch (e) {
        alert('No se pudo enviar: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function resolver() {
      if (!convActual) return;
      try {
        await api('/api/backoffice/resolver', { method: 'POST', body: JSON.stringify({ convId: convActual }) });
        await actualizarHilo(convActual);
        await cargarLista();
      } catch (e) {
        alert('No se pudo actualizar: ' + e.message);
      }
    }

    // Clic de nuevo sobre el mismo botón quita la valoración (toggle).
    async function valorar(convId, valor) {
      if (!convId) return;
      try {
        const todas = await api('/api/backoffice/conversaciones' + qsConversaciones({}));
        const conv = (todas.conversaciones || []).find((c) => c.convId === convId);
        const nuevo = conv && conv.valoracion === valor ? null : valor;
        await api('/api/backoffice/valoracion', { method: 'POST', body: JSON.stringify({ convId, valoracion: nuevo }) });
        await cargarLista();
        await actualizarHilo(convId, true);
      } catch (e) {
        alert('No se pudo guardar la valoración: ' + e.message);
      }
    }

    // ── Respuestas rápidas (atajos), scopeadas por negocio ────────────────
    // En el backoffice de UN negocio: NEGOCIO_SLUG. En "Todas": el negocio de
    // la conversación seleccionada (convNegocioActual), si hay una.
    function negocioEfectivo() { return NEGOCIO_SLUG || convNegocioActual || ''; }

    async function toggleAtajos() {
      const pop = document.getElementById('atajosPop');
      if (pop.classList.contains('abierto')) { pop.classList.remove('abierto'); return; }
      const negocio = negocioEfectivo();
      if (!atajosCache || atajosCacheNegocio !== negocio) {
        try { atajosCache = (await api('/api/backoffice/atajos' + (negocio ? '?negocio=' + encodeURIComponent(negocio) : ''))).atajos || []; atajosCacheNegocio = negocio; } catch (e) { atajosCache = []; }
      }
      pop.innerHTML = (atajosCache.length
        ? atajosCache.map((a) => `<div class="fila" onclick="usarAtajo(${a.id})"><div class="clave">${esc(a.clave)}</div><div class="texto">${esc(a.texto)}</div></div>`).join('')
        : '<div class="fila texto">Todavía no cargaste respuestas rápidas.</div>') +
        '<div class="gestionar" onclick="abrirAtajos()">⚙️ Gestionar respuestas rápidas</div>';
      pop.classList.add('abierto');
    }
    function usarAtajo(id) {
      const a = (atajosCache || []).find((x) => x.id === id);
      if (!a) return;
      document.getElementById('texto').value = a.texto;
      document.getElementById('atajosPop').classList.remove('abierto');
      document.getElementById('texto').focus();
    }

    async function abrirAtajos() {
      document.getElementById('atajosPop')?.classList.remove('abierto');
      const negocio = negocioEfectivo();
      const sel = document.getElementById('nuevoNegocioAtajo');
      sel.innerHTML = '<option value="">Todos los negocios</option>' +
        Object.entries(NEGOCIOS).map(([slug, n]) => `<option value="${esc(slug)}">${esc(n.nombre)}</option>`).join('');
      sel.value = negocio;
      document.getElementById('modalAtajos').classList.add('abierto');
      await recargarAtajosModal();
    }
    function cerrarAtajos() {
      document.getElementById('modalAtajos').classList.remove('abierto');
    }
    async function recargarAtajosModal() {
      const negocio = negocioEfectivo();
      try {
        atajosCache = (await api('/api/backoffice/atajos' + (negocio ? '?negocio=' + encodeURIComponent(negocio) : ''))).atajos || [];
        atajosCacheNegocio = negocio;
      } catch (e) { atajosCache = []; }
      document.getElementById('listaAtajosModal').innerHTML = atajosCache.length
        ? atajosCache.map((a) => `
            <div class="atajoRow">
              <span class="clave">${esc(a.clave)}</span>
              ${a.negocio ? `<span class="neg">${esc(nombreNegocio(a.negocio))}</span>` : ''}
              <span class="texto">${esc(a.texto)}</span>
              <button onclick="borrarAtajoUI(${a.id})" title="Borrar">🗑</button>
            </div>`).join('')
        : '<div class="vacio">Ninguna todavía.</div>';
    }
    async function crearAtajoUI(ev) {
      ev.preventDefault();
      const clave = document.getElementById('nuevaClave').value.trim();
      const texto = document.getElementById('nuevoTexto').value.trim();
      const negocio = document.getElementById('nuevoNegocioAtajo').value || null;
      if (!clave || !texto) return false;
      try {
        await api('/api/backoffice/atajos', { method: 'POST', body: JSON.stringify({ clave, texto, negocio }) });
        document.getElementById('nuevaClave').value = '';
        document.getElementById('nuevoTexto').value = '';
        await recargarAtajosModal();
      } catch (e) {
        alert('No se pudo crear: ' + e.message);
      }
      return false;
    }
    async function borrarAtajoUI(id) {
      try {
        await api('/api/backoffice/atajos/' + id, { method: 'DELETE' });
        await recargarAtajosModal();
      } catch (e) {
        alert('No se pudo borrar: ' + e.message);
      }
    }

    // Sin un negocio elegido (ni la vista "Todas"), mostramos el selector.
    // Con negocio (o ?todas=1): ¿ya había sesión activa? probamos con /me;
    // si responde, entramos directo; si no, pedimos usuario y contraseña.
    if (!NEGOCIO && !VER_TODAS) {
      mostrarChooser();
    } else {
      api('/api/backoffice/me').then((d) => mostrarApp(d.agente)).catch(mostrarLogin);
    }
  </script>
</body>

</html>
