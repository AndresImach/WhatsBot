<!DOCTYPE html>
<html lang="es-AR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM — Usados y Nuevos Tucumán</title>
  <!-- Backoffice CRM de la concesionaria. La pestaña CHATS (y el equipo:
       agentes + respuestas rápidas) es REAL: usa el mismo backend y el mismo
       login por agente que demo/backoffice.html, scopeada al negocio
       "usadosnuevos" de negocios.js. Inventario, leads, turnos y tomas de
       usado siguen siendo maqueta con datos en memoria (todavía no hay
       backend para eso). Cero dependencias. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/formato-whatsapp.css">
  <script src="/formato-whatsapp.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    html, body { height: 100% }
    body { font-family: 'Manrope', system-ui, sans-serif; background: #F5F7F5; color: #16201B; overflow: hidden }
    button, input, select, textarea { font-family: inherit }
    a { color: #0E7C4A }
    a:hover { color: #0B6339 }
    ::-webkit-scrollbar { width: 8px; height: 8px }
    ::-webkit-scrollbar-thumb { background: #D7DBD8; border-radius: 4px }

    /* ── Login ── */
    #login { display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 16px }
    #login form { background: #fff; border: 1px solid #E1E6E2; border-radius: 16px; padding: 28px; width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 10px }
    #login .cabeceraLogin { display: flex; align-items: center; gap: 10px; margin-bottom: 8px }
    #login h1 { font-size: 15px; font-weight: 800 }
    #login .sub { font-size: 11.5px; color: #667169; font-weight: 600 }
    #login .err { color: #DC2626; font-size: 12px; min-height: 1em; font-weight: 600 }
    #login button { background: #0E7C4A; color: #fff; border: none; padding: 11px; border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: 700 }

    .layout { display: none; height: 100vh; width: 100%; overflow: hidden }
    .layout.visible { display: flex }

    /* ── Barra lateral ── */
    .sidebar { width: 228px; min-width: 228px; background: #fff; border-right: 1px solid #E1E6E2; display: flex; flex-direction: column; height: 100% }
    .sidebar .marca { padding: 20px 18px 16px; border-bottom: 1px solid #E1E6E2; display: flex; align-items: center; gap: 10px }
    .logo { width: 38px; height: 38px; border-radius: 10px; background: #0E7C4A; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; flex-shrink: 0 }
    .sidebar nav { flex: 1; overflow-y: auto; padding: 14px 10px; display: flex; flex-direction: column; gap: 3px }
    .nav-btn { text-align: left; padding: 10px 12px; border-radius: 9px; border: none; background: transparent; color: #3A453E; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100% }
    .nav-btn.activa { background: #0E7C4A; color: #fff; font-weight: 800 }
    .badge { background: #DC2626; color: #fff; font-size: 10.5px; font-weight: 800; padding: 1px 7px; border-radius: 10px }
    .sidebar .pie { padding: 14px 12px; border-top: 1px solid #E1E6E2 }
    .avatar { border-radius: 50%; background: #E6F4EC; color: #0E7C4A; display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0 }
    .recorte { overflow: hidden; text-overflow: ellipsis; white-space: nowrap }

    /* ── Contenido ── */
    .contenido { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; overflow: hidden }
    .cabecera { padding: 16px 28px; border-bottom: 1px solid #E1E6E2; background: #fff; display: flex; align-items: baseline; gap: 12px; flex-shrink: 0 }
    .cabecera h1 { font-size: 19px; font-weight: 800 }
    .cabecera .sub { font-size: 12.5px; color: #667169; font-weight: 400 }
    #main { flex: 1; min-width: 0; overflow: hidden; display: flex; flex-direction: column }

    /* ── Piezas comunes ── */
    .card { background: #fff; border: 1px solid #E1E6E2; border-radius: 14px }
    .pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap }
    .pill-muted { display: inline-flex; padding: 3px 9px; border-radius: 8px; font-size: 10.5px; font-weight: 700; background: #EEF1EF; color: #3A453E }
    .btn-verde { background: #0E7C4A; color: #fff; border: none; border-radius: 9px; cursor: pointer; font-weight: 700; font-size: 12.5px; padding: 9px 16px }
    .btn-borde { padding: 7px 10px; border-radius: 8px; border: 1px solid #E1E6E2; background: #fff; cursor: pointer; font-size: 11.5px }
    .btn-rojo { border: 1px solid #FBDADA; background: #fff; color: #DC2626; cursor: pointer; border-radius: 6px; font-size: 11px; padding: 5px 8px }
    .input { padding: 9px 11px; border-radius: 8px; border: 1px solid #E1E6E2; font-size: 12.5px; outline: none; width: 100%; background: #fff }
    .hover-suave:hover { background: #F7F9F7 }
    .foto-slot { background: #F0F2F0; color: #98A199; display: flex; align-items: center; justify-content: center; font-size: 11.5px; font-weight: 600; width: 100%; height: 100% }

    /* Burbujas del hilo (formato de WhatsApp vía formato-whatsapp.js) */
    .burbuja { max-width: 70%; padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.4; white-space: pre-wrap }
    .burbuja .hora { display: block; font-size: 10px; opacity: .6; margin-top: 4px }
    .burbuja.user { align-self: flex-start; background: #EEF1EF; color: #16201B; border-bottom-left-radius: 3px }
    .burbuja.assistant { align-self: flex-end; background: #2563EB; color: #fff; border-bottom-right-radius: 3px }
    .burbuja.humano { align-self: flex-end; background: #0E7C4A; color: #fff; border-bottom-right-radius: 3px }
    .burbuja.assistant a, .burbuja.humano a { color: #fff; text-decoration: underline }

    /* ── Modales ── */
    .modal-fondo { position: fixed; inset: 0; background: rgba(15, 20, 17, .42); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px }
    .modal { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-height: 88vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px }
    .modal h2 { font-size: 16px; font-weight: 800 }
    .modal .acciones { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px }
    .btn-cancelar { padding: 10px 18px; border-radius: 9px; border: 1px solid #E1E6E2; background: #fff; cursor: pointer; font-size: 13px; font-weight: 700 }
    .btn-guardar { padding: 10px 18px; border-radius: 9px; border: none; background: #0E7C4A; color: #fff; cursor: pointer; font-size: 13px; font-weight: 700 }
  </style>
</head>

<body>
  <div id="login">
    <form id="loginForm">
      <div class="cabeceraLogin">
        <div class="logo">UN</div>
        <div>
          <h1>Usados y Nuevos</h1>
          <div class="sub">Tucumán · Backoffice CRM</div>
        </div>
      </div>
      <div class="err" id="loginErr"></div>
      <input class="input" type="text" id="loginUsuario" placeholder="Usuario" autofocus autocomplete="username">
      <input class="input" type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
  </div>

  <div class="layout" id="layout">
    <aside class="sidebar">
      <div class="marca">
        <div class="logo">UN</div>
        <div style="min-width:0">
          <div class="recorte" style="font-weight:800;font-size:13.5px;line-height:1.25">Usados y Nuevos</div>
          <div style="font-size:11px;color:#667169;font-weight:600">Tucumán · Backoffice</div>
        </div>
      </div>
      <nav id="nav"></nav>
      <div class="pie">
        <div style="display:flex;align-items:center;gap:8px;padding:6px">
          <div class="avatar" id="pieAvatar" style="width:30px;height:30px;font-size:12px"></div>
          <div style="min-width:0;flex:1">
            <div class="recorte" id="pieNombre" style="font-size:12.5px;font-weight:700"></div>
            <div style="font-size:10.5px;color:#667169">Agente</div>
          </div>
          <button data-act="logout" style="border:none;background:none;color:#667169;cursor:pointer;font-size:11px;font-weight:700">Salir</button>
        </div>
      </div>
    </aside>

    <div class="contenido">
      <div class="cabecera">
        <h1 id="vTitulo"></h1>
        <div class="sub" id="vSub"></div>
        <span class="pill-muted" id="vDemoPill" style="display:none">Datos de ejemplo</span>
      </div>
      <div id="main"></div>
    </div>
  </div>
  <div id="modal"></div>

  <script>
    // ═══════════════════ Config / catálogos ═══════════════════
    // El CRM es de UN negocio (la concesionaria). ?n= permite apuntarlo a otro.
    const NEGOCIO_SLUG = new URLSearchParams(location.search).get('n') || 'usadosnuevos';

    const STAGES = [
      { key: 'nuevo', label: 'Nuevo', color: '#2563EB', bg: '#E8EEFC' },
      { key: 'contactado', label: 'Contactado', color: '#7C3AED', bg: '#F1EAFB' },
      { key: 'test_drive', label: 'Test drive', color: '#D97706', bg: '#FDF1E1' },
      { key: 'negociacion', label: 'Negociación', color: '#DB2777', bg: '#FCE7F1' },
      { key: 'vendido', label: 'Vendido', color: '#0E7C4A', bg: '#E6F4EC' },
      { key: 'perdido', label: 'Perdido', color: '#6B7670', bg: '#EEF1EF' },
    ];
    const APPT_ESTADOS = {
      programado: { label: 'Programado', color: '#2563EB', bg: '#E8EEFC' },
      confirmado: { label: 'Confirmado', color: '#0E7C4A', bg: '#E6F4EC' },
      realizado: { label: 'Realizado', color: '#667169', bg: '#EEF1EF' },
      cancelado: { label: 'Cancelado', color: '#DC2626', bg: '#FDEAEA' },
    };
    const TRADEIN_ESTADOS = {
      pendiente: { label: 'Pendiente evaluación', color: '#D97706', bg: '#FDF1E1' },
      evaluado: { label: 'Evaluado', color: '#2563EB', bg: '#E8EEFC' },
      oferta_enviada: { label: 'Oferta enviada', color: '#7C3AED', bg: '#F1EAFB' },
      aceptado: { label: 'Aceptado', color: '#0E7C4A', bg: '#E6F4EC' },
      rechazado: { label: 'Rechazado', color: '#DC2626', bg: '#FDEAEA' },
    };
    const DISP = {
      stock: { label: 'En stock', color: '#0E7C4A', bg: '#E6F4EC' },
      consultar: { label: 'Consultar', color: '#D97706', bg: '#FDF1E1' },
      vendido: { label: 'Vendido', color: '#DC2626', bg: '#FDEAEA' },
    };
    const ORIGEN_LABELS = { chat: 'Chat', web: 'Web', manual: 'Manual' };
    // [clave, título, subtítulo, esMaqueta]
    const VISTAS = [
      ['dashboard', 'Panel', 'Resumen general de la concesionaria', false],
      ['chats', 'Chats', 'Conversaciones de WhatsApp con clientes', false],
      ['inventory', 'Inventario', 'Vehículos publicados en el sitio', true],
      ['leads', 'Leads', 'Seguimiento de oportunidades de venta', true],
      ['appointments', 'Turnos', 'Test drives y visitas agendadas', true],
      ['tradeins', 'Tomas de usado', 'Vehículos ofrecidos como parte de pago', true],
      ['team', 'Equipo', 'Agentes y respuestas rápidas', false],
    ];

    // Fechas de los datos de maqueta relativas a hoy, para que el panel
    // ("test drives hoy", "próximos turnos") nunca quede vacío por viejo.
    function diaISO(offset) {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toISOString().slice(0, 10);
    }

    // ═══════════════════ Estado ═══════════════════
    const S = {
      view: 'dashboard',

      // ── Real (backend del backoffice) ──
      agente: null,      // sesión actual (id, usuario, nombre)
      agentes: [],       // agentes activos, para asignación
      convs: [],         // conversaciones del negocio (sin filtro de tab)
      chatConvs: [],     // lista filtrada por tab/etiqueta
      chatError: '',
      mensajes: [],
      notas: [],
      atajos: null,      // respuestas rápidas (se cargan a demanda)

      selectedConvId: null,
      chatTab: 'humano',
      chatTagFilter: '',
      chatPanelTab: 'hilo',
      composerText: '',
      noteText: '',

      // ── Maqueta (sin backend todavía) ──
      cars: [
        { id: 1, marca: 'Toyota', modelo: 'Hilux', version: 'SRX 4x4', anio: 2022, km: 38000, transmision: 'Automática', combustible: 'Diésel', precio: 42000000, moneda: '$', disponibilidad: 'stock', publicado: true, vistas: 812, consultas: 14 },
        { id: 2, marca: 'Volkswagen', modelo: 'Amarok', version: 'V6 Extreme', anio: 2021, km: 52000, transmision: 'Automática', combustible: 'Diésel', precio: 38000, moneda: 'USD', disponibilidad: 'stock', publicado: true, vistas: 640, consultas: 9 },
        { id: 3, marca: 'Chevrolet', modelo: 'Tracker', version: 'Premier', anio: 2023, km: 12000, transmision: 'Automática', combustible: 'Nafta', precio: 27500000, moneda: '$', disponibilidad: 'stock', publicado: true, vistas: 455, consultas: 6 },
        { id: 4, marca: 'Fiat', modelo: 'Cronos', version: 'Drive', anio: 2020, km: 68000, transmision: 'Manual', combustible: 'Nafta', precio: 15800000, moneda: '$', disponibilidad: 'stock', publicado: false, vistas: 0, consultas: 0 },
        { id: 5, marca: 'Ford', modelo: 'Ranger', version: 'Limited', anio: 2019, km: 95000, transmision: 'Automática', combustible: 'Diésel', precio: 29500, moneda: 'USD', disponibilidad: 'consultar', publicado: true, vistas: 288, consultas: 11 },
        { id: 6, marca: 'Peugeot', modelo: '208', version: 'Allure', anio: 2023, km: 8000, transmision: 'Manual', combustible: 'Nafta', precio: 19900000, moneda: '$', disponibilidad: 'vendido', publicado: false, vistas: 190, consultas: 3 },
        { id: 7, marca: 'Jeep', modelo: 'Compass', version: 'Longitude', anio: 2022, km: 30000, transmision: 'Automática', combustible: 'Nafta', precio: 33000, moneda: 'USD', disponibilidad: 'stock', publicado: true, vistas: 521, consultas: 8 },
      ],
      leads: [
        { id: 1, nombre: 'Martín Roldán', telefono: '381-555-0142', interes: 'Toyota Hilux SRX', origen: 'chat', agente: 'Valentina Suárez', etapa: 'nuevo', fecha: diaISO(-2) },
        { id: 2, nombre: 'Lucía Farías', telefono: '381-555-0198', interes: 'VW Amarok V6', origen: 'chat', agente: 'Nicolás Gómez', etapa: 'contactado', fecha: diaISO(-4) },
        { id: 3, nombre: 'Diego Paz', telefono: '381-555-0233', interes: 'Chevrolet Tracker', origen: 'web', agente: 'Valentina Suárez', etapa: 'test_drive', fecha: diaISO(-5) },
        { id: 4, nombre: 'Sofía Medina', telefono: '381-555-0311', interes: 'Jeep Compass', origen: 'manual', agente: 'Nicolás Gómez', etapa: 'negociacion', fecha: diaISO(-7) },
        { id: 5, nombre: 'Ramiro Correa', telefono: '381-555-0402', interes: 'Ford Ranger Limited', origen: 'chat', agente: 'Valentina Suárez', etapa: 'vendido', fecha: diaISO(-12) },
        { id: 6, nombre: 'Camila Ibarra', telefono: '381-555-0455', interes: 'Fiat Cronos Drive', origen: 'web', agente: 'Nicolás Gómez', etapa: 'perdido', fecha: diaISO(-14) },
        { id: 7, nombre: 'Julián Ortiz', telefono: '381-555-0509', interes: 'Peugeot 208 Allure', origen: 'chat', agente: 'Valentina Suárez', etapa: 'contactado', fecha: diaISO(-3) },
        { id: 8, nombre: 'Agustina Vera', telefono: '381-555-0577', interes: 'Toyota Hilux SRX', origen: 'chat', agente: 'Nicolás Gómez', etapa: 'nuevo', fecha: diaISO(-1) },
      ],
      appointments: [
        { id: 1, fecha: diaISO(0), hora: '10:00', cliente: 'Diego Paz', vehiculo: 'Chevrolet Tracker Premier', agente: 'Valentina Suárez', estado: 'confirmado' },
        { id: 2, fecha: diaISO(0), hora: '16:30', cliente: 'Sofía Medina', vehiculo: 'Jeep Compass Longitude', agente: 'Nicolás Gómez', estado: 'programado' },
        { id: 3, fecha: diaISO(1), hora: '11:00', cliente: 'Martín Roldán', vehiculo: 'Toyota Hilux SRX', agente: 'Valentina Suárez', estado: 'programado' },
        { id: 4, fecha: diaISO(-2), hora: '09:30', cliente: 'Lucía Farías', vehiculo: 'VW Amarok V6', agente: 'Nicolás Gómez', estado: 'realizado' },
        { id: 5, fecha: diaISO(-3), hora: '15:00', cliente: 'Camila Ibarra', vehiculo: 'Fiat Cronos Drive', agente: 'Valentina Suárez', estado: 'cancelado' },
      ],
      tradeins: [
        { id: 1, cliente: 'Ramiro Correa', telefono: '381-555-0402', marca: 'Renault', modelo: 'Sandero', anio: 2018, km: 70000, valorEstimado: 9500000, estado: 'evaluado', nota: 'Buen estado general, service al día.' },
        { id: 2, cliente: 'Agustina Vera', telefono: '381-555-0577', marca: 'Ford', modelo: 'Fiesta', anio: 2016, km: 110000, valorEstimado: 5200000, estado: 'pendiente', nota: '' },
        { id: 3, cliente: 'Julián Ortiz', telefono: '381-555-0509', marca: 'Chevrolet', modelo: 'Onix', anio: 2019, km: 58000, valorEstimado: 8100000, estado: 'oferta_enviada', nota: 'Ofertado como parte de pago del 208.' },
        { id: 4, cliente: 'Diego Paz', telefono: '381-555-0233', marca: 'Peugeot', modelo: '308', anio: 2015, km: 132000, valorEstimado: 4300000, estado: 'rechazado', nota: 'Cliente rechazó la oferta, muy bajo.' },
      ],

      modal: null, // { tipo: 'car'|'lead'|'appt'|'tradein', id: number|null }
    };

    // ═══════════════════ Helpers ═══════════════════
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function pillStyle(bg, color) { return `background:${bg};color:${color}`; }
    function fmtMoney(n, moneda) {
      if (!n) return 'A consultar';
      const s = Number(n).toLocaleString('es-AR');
      return moneda === 'USD' ? 'USD ' + s : '$ ' + s;
    }
    function fmtKm(n) { return n != null ? Number(n).toLocaleString('es-AR') + ' km' : '—'; }
    function iniciales(nombre) { return (nombre || '').split(' ').filter(Boolean).slice(0, 2).map((w) => w[0].toUpperCase()).join(''); }
    function proximoId(lista) { return Math.max(0, ...lista.map((x) => x.id)) + 1; }
    function sel(a, b) { return a === b ? ' selected' : ''; }
    function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
    function hora(ts) { return (ts || '').slice(0, 16).replace('T', ' '); }
    function corto(id) { return (id || '').slice(0, 8); }
    function etiquetasDe(c) { return ((c && c.etiquetas) || '').split(',').map((t) => t.trim()).filter(Boolean); }
    function convActiva() { return S.convs.find((c) => c.convId === S.selectedConvId) || null; }
    function contenidoWA(texto) { return window.formatearWhatsApp ? formatearWhatsApp(texto) : esc(texto); }
    function nombresAgentes() { return S.agentes.map((a) => a.nombre || a.usuario); }

    // ═══════════════════ Backend (mismo contrato que demo/backoffice.html) ═══
    async function api(path, opts) {
      const r = await fetch(path, { ...opts, headers: { 'Content-Type': 'application/json', ...(opts && opts.headers) } });
      if (r.status === 401) { mostrarLogin(); throw new Error('no autorizado'); }
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
      return d;
    }

    async function cargarConvs() {
      S.convs = (await api('/api/backoffice/conversaciones?negocio=' + encodeURIComponent(NEGOCIO_SLUG))).conversaciones || [];
    }
    async function cargarChatList() {
      const p = new URLSearchParams({ negocio: NEGOCIO_SLUG });
      if (S.chatTab === 'humano') p.set('estado', 'humano');
      else if (S.chatTab === 'mias') p.set('asignado', 'mias');
      else if (S.chatTab === 'sin_asignar') p.set('asignado', 'sin_asignar');
      if (S.chatTagFilter.trim()) p.set('etiqueta', S.chatTagFilter.trim());
      try {
        S.chatConvs = (await api('/api/backoffice/conversaciones?' + p)).conversaciones || [];
        S.chatError = '';
      } catch (e) {
        if (e.message !== 'no autorizado') S.chatError = e.message;
      }
    }
    async function cargarHilo(silencioso) {
      if (!S.selectedConvId) return;
      const convId = S.selectedConvId;
      let data;
      try {
        data = await api('/api/backoffice/mensajes?convId=' + encodeURIComponent(convId));
      } catch (e) { return; }
      if (convId !== S.selectedConvId) return; // cambiaste de conversación mientras esto estaba en vuelo
      S.mensajes = data.mensajes || [];
      pintarHilo(silencioso);
    }
    async function cargarNotas() {
      if (!S.selectedConvId) return;
      try {
        S.notas = (await api('/api/backoffice/notas?convId=' + encodeURIComponent(S.selectedConvId))).notas || [];
      } catch (e) { return; }
      pintarNotas();
    }
    async function cargarAtajos(forzar) {
      if (S.atajos && !forzar) return;
      try {
        S.atajos = (await api('/api/backoffice/atajos?negocio=' + encodeURIComponent(NEGOCIO_SLUG))).atajos || [];
      } catch (e) { S.atajos = S.atajos || []; }
    }

    // ═══════════════════ Sesión ═══════════════════
    function mostrarLogin() {
      document.getElementById('layout').classList.remove('visible');
      document.getElementById('login').style.display = 'flex';
      clearInterval(window._poll); window._poll = null;
      S.agente = null;
    }
    async function mostrarApp(agente) {
      S.agente = agente;
      document.getElementById('login').style.display = 'none';
      document.getElementById('layout').classList.add('visible');
      document.getElementById('pieAvatar').textContent = iniciales(agente.nombre || agente.usuario);
      document.getElementById('pieNombre').textContent = agente.nombre || agente.usuario;
      try { S.agentes = (await api('/api/backoffice/agentes')).agentes || []; } catch (e) {}
      try { await cargarConvs(); } catch (e) {}
      await cargarChatList();
      render();
      if (!window._poll) {
        window._poll = setInterval(async () => {
          try {
            await cargarConvs();
            pintarNav();
            if (S.view === 'chats') {
              await cargarChatList();
              pintarChatList();
              if (S.selectedConvId) { await cargarHilo(true); pintarHeaderConv(); }
            } else if (S.view === 'dashboard') {
              render();
            }
          } catch (e) {}
        }, 4000);
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const err = document.getElementById('loginErr');
      err.textContent = '';
      try {
        const d = await api('/api/backoffice/login', {
          method: 'POST',
          body: JSON.stringify({ usuario: document.getElementById('loginUsuario').value, password: document.getElementById('loginPass').value }),
        });
        mostrarApp(d.agente);
      } catch (e) {
        err.textContent = e.message === 'no autorizado' ? 'Usuario o contraseña incorrectos.' : e.message;
      }
    });

    // ═══════════════════ Render ═══════════════════
    function pintarNav() {
      const esperan = S.convs.filter((c) => c.estado === 'humano').length;
      document.getElementById('nav').innerHTML = VISTAS.map(([key, label]) => `
        <button class="nav-btn${S.view === key ? ' activa' : ''}" data-act="nav" data-view="${key}">
          <span>${label}</span>${key === 'chats' && esperan ? `<span class="badge">${esperan}</span>` : ''}
        </button>`).join('');
    }
    function render() {
      pintarNav();
      const [, titulo, sub, esMaqueta] = VISTAS.find(([key]) => key === S.view);
      document.getElementById('vTitulo').textContent = titulo;
      document.getElementById('vSub').textContent = sub;
      document.getElementById('vDemoPill').style.display = esMaqueta ? 'inline-flex' : 'none';
      const vistas = { dashboard: vDashboard, chats: vChats, inventory: vInventario, leads: vLeads, appointments: vTurnos, tradeins: vTomas, team: vEquipo };
      document.getElementById('main').innerHTML = vistas[S.view]();
      if (S.view === 'chats') { pintarChatList(); pintarHeaderConv(); pintarHilo(); pintarNotas(); }
      renderModal();
    }

    // ── Panel ──
    function vDashboard() {
      const esperan = S.convs.filter((c) => c.estado === 'humano');
      const stockUnidades = S.cars.filter((c) => c.disponibilidad !== 'vendido').length;
      const stockArs = S.cars.filter((c) => c.disponibilidad === 'stock' && c.moneda === '$').reduce((a, c) => a + c.precio, 0);
      const stockUsd = S.cars.filter((c) => c.disponibilidad === 'stock' && c.moneda === 'USD').reduce((a, c) => a + c.precio, 0);
      const leadsActivos = S.leads.filter((l) => l.etapa !== 'vendido' && l.etapa !== 'perdido').length;
      const vendidos = S.leads.filter((l) => l.etapa === 'vendido').length;
      const testDrivesHoy = S.appointments.filter((a) => a.fecha === diaISO(0)).length;
      const kpis = [
        { label: 'Unidades en stock', value: String(stockUnidades), sub: `${S.cars.length} en el inventario`, subColor: '#667169' },
        { label: 'Valor en stock (ARS)', value: '$ ' + stockArs.toLocaleString('es-AR'), sub: 'Vehículos en pesos', subColor: '#667169' },
        { label: 'Valor en stock (USD)', value: 'USD ' + stockUsd.toLocaleString('es-AR'), sub: 'Vehículos en dólares', subColor: '#667169' },
        { label: 'Leads activos', value: String(leadsActivos), sub: `${vendidos} vendidos este mes`, subColor: '#0E7C4A' },
        { label: 'Test drives hoy', value: String(testDrivesHoy), sub: `${S.appointments.length} turnos totales`, subColor: '#667169' },
        { label: 'Esperan una persona', value: String(esperan.length), sub: `${S.convs.length} conversaciones`, subColor: esperan.length ? '#D97706' : '#667169' },
      ];
      const maxEtapa = Math.max(1, ...STAGES.map((st) => S.leads.filter((l) => l.etapa === st.key).length));
      const barras = STAGES.map((st) => {
        const count = S.leads.filter((l) => l.etapa === st.key).length;
        return { label: st.label, count, color: st.color, pct: Math.max(4, Math.round((count / maxEtapa) * 100)) };
      });
      const proximos = S.appointments
        .filter((a) => a.estado !== 'cancelado' && a.estado !== 'realizado')
        .sort((a, b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora)).slice(0, 4);

      return `
      <div style="flex:1;overflow-y:auto;padding:28px">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px">
          ${kpis.map((k) => `
          <div class="card" style="padding:18px 20px;display:flex;flex-direction:column;gap:6px">
            <div style="font-size:12px;color:#667169;font-weight:700">${k.label}</div>
            <div style="font-size:26px;font-weight:800">${k.value}</div>
            <div style="font-size:11.5px;color:${k.subColor};font-weight:700">${k.sub}</div>
          </div>`).join('')}
        </div>

        <div style="display:grid;grid-template-columns:minmax(0,1.3fr) minmax(0,1fr);gap:20px;margin-top:20px;align-items:start">
          <div class="card" style="padding:20px">
            <div style="font-size:14.5px;font-weight:800;margin-bottom:14px">Pipeline de leads</div>
            <div style="display:flex;flex-direction:column;gap:12px">
              ${barras.map((b) => `
              <div>
                <div style="display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;margin-bottom:5px">
                  <span>${b.label}</span><span style="color:#667169">${b.count}</span>
                </div>
                <div style="height:9px;background:#F0F2F0;border-radius:5px;overflow:hidden">
                  <div style="height:100%;border-radius:5px;background:${b.color};width:${b.pct}%"></div>
                </div>
              </div>`).join('')}
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:20px">
            <div class="card" style="padding:18px 20px">
              <div style="font-size:14.5px;font-weight:800;margin-bottom:12px">Próximos turnos</div>
              <div style="display:flex;flex-direction:column;gap:10px">
                ${proximos.map((a) => `
                <div style="display:flex;justify-content:space-between;gap:8px;font-size:12.5px">
                  <div>
                    <div style="font-weight:700">${esc(a.cliente)}</div>
                    <div style="color:#667169">${esc(a.vehiculo)}</div>
                  </div>
                  <div style="text-align:right;color:#667169;white-space:nowrap">${a.fecha}<br/>${a.hora}</div>
                </div>`).join('')}
                ${proximos.length ? '' : '<div style="font-size:12.5px;color:#98A199">No hay turnos próximos.</div>'}
              </div>
            </div>

            <div class="card" style="padding:18px 20px">
              <div style="font-size:14.5px;font-weight:800;margin-bottom:12px">Esperan una persona</div>
              <div style="display:flex;flex-direction:column;gap:8px">
                ${esperan.slice(0, 4).map((c) => `
                <div class="hover-suave" data-act="openConv" data-id="${esc(c.convId)}" style="cursor:pointer;font-size:12.5px">
                  <div style="font-weight:700">Conversación ${esc(corto(c.convId))}…</div>
                  <div class="recorte" style="color:#667169">${hora(c.updatedAt)}${etiquetasDe(c).length ? ' · ' + etiquetasDe(c).map(esc).join(', ') : ''}</div>
                </div>`).join('')}
                ${esperan.length ? '' : '<div style="font-size:12.5px;color:#98A199">Ninguna conversación necesita una persona.</div>'}
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }

    // ── Chats (contra el backend real) ──
    function tabChatStyle(activa) {
      return `flex:1;justify-content:center;text-align:center;padding:7px 8px;border-radius:9px;border:none;font-size:11.5px;cursor:pointer;` +
        (activa ? 'background:#0E7C4A;color:#fff;font-weight:800' : 'background:transparent;color:#3A453E;font-weight:600');
    }
    function pintarChatList() {
      const cont = document.getElementById('chatList');
      if (!cont) return;
      if (S.chatError) {
        cont.innerHTML = `<div style="padding:30px 16px;text-align:center;color:#DC2626;font-size:12.5px">⚠️ ${esc(S.chatError)}</div>`;
        return;
      }
      if (!S.chatConvs.length) {
        cont.innerHTML = '<div style="padding:30px 16px;text-align:center;color:#98A199;font-size:12.5px">' +
          (S.chatTab === 'humano' ? 'Ninguna conversación necesita una persona ahora mismo.' : 'No hay conversaciones con este filtro.') + '</div>';
        return;
      }
      cont.innerHTML = S.chatConvs.map((c) => {
        const estadoPill = c.estado === 'humano'
          ? `<span class="pill" style="${pillStyle('#FDF1E1', '#D97706')};font-size:10.5px;padding:2px 8px;border-radius:10px">Persona</span>`
          : `<span class="pill" style="${pillStyle('#E8EEFC', '#2563EB')};font-size:10.5px;padding:2px 8px;border-radius:10px">Bot</span>`;
        const valor = c.valoracion === 'positiva' ? `<span class="pill" style="${pillStyle('#E6F4EC', '#0E7C4A')};font-size:10.5px;padding:2px 8px;border-radius:10px">👍</span>`
          : c.valoracion === 'negativa' ? `<span class="pill" style="${pillStyle('#FDEAEA', '#DC2626')};font-size:10.5px;padding:2px 8px;border-radius:10px">👎</span>` : '';
        return `
        <div data-act="selConv" data-id="${esc(c.convId)}" style="padding:12px 14px;border-bottom:1px solid #F0F2F0;cursor:pointer;background:${c.convId === S.selectedConvId ? '#F0F7F3' : '#fff'}">
          <div style="display:flex;justify-content:space-between;gap:8px">
            <span class="recorte" style="font-weight:700;font-size:13px">Conversación ${esc(corto(c.convId))}…</span>
            <span style="font-size:10.5px;color:#98A199;white-space:nowrap">${hora(c.updatedAt)}</span>
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">
            ${estadoPill}${valor}
            ${c.asignadoNombre ? `<span style="display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;background:#F1EAFB;color:#7C3AED">${esc(c.asignadoNombre)}</span>` : ''}
            ${etiquetasDe(c).map((t) => `<span style="display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10.5px;background:#EEF1EF;color:#3A453E">${esc(t)}</span>`).join('')}
          </div>
        </div>`;
      }).join('');
    }

    // Header + fila de etiquetas de la conversación activa. Se actualiza en
    // cada poll SIN tocar el compositor (para no pisar lo que estás
    // escribiendo) y respetando el foco en el select o el input de etiquetas.
    function pintarHeaderConv() {
      const conv = convActiva();
      const zona = document.getElementById('estadoZona');
      const acciones = document.getElementById('convAcciones');
      const filaEtiquetas = document.getElementById('etiquetasRow');
      if (!zona || !conv) return;
      // Solo se salta el repintado si el foco está en un control con estado a
      // medio escribir/elegir (select o input); un botón enfocado no cuenta.
      const foco = document.activeElement;
      const focoConEstado = foco && (foco.tagName === 'SELECT' || foco.tagName === 'INPUT' || foco.tagName === 'TEXTAREA');
      zona.innerHTML = conv.estado === 'humano'
        ? `<span class="pill" style="${pillStyle('#FDF1E1', '#D97706')}">Esperando persona</span>`
        : `<span class="pill" style="${pillStyle('#E8EEFC', '#2563EB')}">Bot activo</span>`;
      if (acciones && !(focoConEstado && acciones.contains(foco))) {
        const btnPos = `padding:7px 12px;border-radius:8px;border:1px solid ${conv.valoracion === 'positiva' ? '#0E7C4A' : '#E1E6E2'};background:${conv.valoracion === 'positiva' ? '#E6F4EC' : '#fff'};color:${conv.valoracion === 'positiva' ? '#0E7C4A' : '#3A453E'};cursor:pointer;font-size:12px;font-weight:700`;
        const btnNeg = `padding:7px 12px;border-radius:8px;border:1px solid ${conv.valoracion === 'negativa' ? '#DC2626' : '#E1E6E2'};background:${conv.valoracion === 'negativa' ? '#FDEAEA' : '#fff'};color:${conv.valoracion === 'negativa' ? '#DC2626' : '#3A453E'};cursor:pointer;font-size:12px;font-weight:700`;
        acciones.innerHTML = `
          <select data-act="assign" style="padding:6px 8px;border-radius:8px;border:1px solid #E1E6E2;font-size:12px;background:#fff">
            <option value=""${sel(conv.asignadoA || null, null)}>Sin asignar</option>
            ${S.agentes.map((a) => `<option value="${a.id}"${sel(conv.asignadoA, a.id)}>${esc(a.nombre || a.usuario)}</option>`).join('')}
          </select>
          <button data-act="valorar" data-v="positiva" style="${btnPos}">+ Bien resuelto</button>
          <button data-act="valorar" data-v="negativa" style="${btnNeg}">− Mal resuelto</button>
          ${conv.estado === 'humano' ? '<button data-act="resolver" style="padding:7px 12px;border-radius:8px;border:1px solid #E1E6E2;background:#fff;cursor:pointer;font-size:12px;font-weight:700">Devolver al bot</button>' : ''}`;
      }
      if (filaEtiquetas && !(focoConEstado && filaEtiquetas.contains(foco))) {
        filaEtiquetas.innerHTML = etiquetasDe(conv).map((t) => `
          <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11.5px;background:#EEF1EF;color:#3A453E">${esc(t)}<button data-act="delTag" data-tag="${esc(t)}" style="border:none;background:none;cursor:pointer;color:#98A199;font-size:12px;padding:0">×</button></span>`).join('') +
          `<input data-key="tag" placeholder="+ etiqueta" style="width:110px;padding:4px 8px;border-radius:10px;border:1px solid #E1E6E2;font-size:11.5px;outline:none"/>`;
      }
    }

    function pintarHilo(silencioso) {
      const hilo = document.getElementById('hilo');
      if (!hilo) return;
      const yaAbajo = hilo.scrollHeight - hilo.scrollTop - hilo.clientHeight < 60;
      hilo.innerHTML = S.mensajes.map((m) => `
        <div class="burbuja wa-text ${esc(m.rol)}">${contenidoWA(m.contenido)}<span class="hora">${hora(m.ts)}</span></div>`).join('');
      if (!silencioso || yaAbajo) hilo.scrollTop = hilo.scrollHeight;
    }

    function pintarNotas() {
      const bloque = document.getElementById('notasLista');
      if (!bloque) return;
      bloque.innerHTML = S.notas.length
        ? S.notas.map((n) => `
          <div style="background:#FDF7E8;border:1px solid #F0E2B8;border-radius:10px;padding:10px 14px;font-size:12.5px">
            <div style="font-size:11px;color:#A9852B;font-weight:700;margin-bottom:3px">${esc(n.agenteNombre) || '—'} · ${hora(n.ts)}</div>
            ${esc(n.texto)}
          </div>`).join('')
        : '<div style="color:#98A199;font-size:12.5px;text-align:center;padding:20px">Todavía no hay notas en esta conversación.</div>';
      bloque.scrollTop = bloque.scrollHeight;
    }

    function vChats() {
      const conv = convActiva();
      const subtab = (activa) => `background:none;border:none;border-bottom:2px solid ${activa ? '#0E7C4A' : 'transparent'};color:${activa ? '#16201B' : '#98A199'};padding:6px 10px;cursor:pointer;font-size:12.5px;font-weight:700`;

      const panel = !conv ? `
        <div style="flex:1;display:flex;align-items:center;justify-content:center;color:#98A199;font-size:13px">Elegí una conversación de la izquierda.</div>` : `
        <div style="padding:14px 20px;border-bottom:1px solid #E1E6E2;background:#fff;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div>
            <div style="font-weight:800;font-size:14px">Conversación</div>
            <div style="font-size:11.5px;color:#667169">${esc(conv.convId)}</div>
          </div>
          <span id="estadoZona"></span>
          <div id="convAcciones" style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap"></div>
        </div>

        <div id="etiquetasRow" style="padding:8px 20px;border-bottom:1px solid #E1E6E2;background:#fff;display:flex;gap:6px;flex-wrap:wrap;align-items:center"></div>

        <div style="display:flex;gap:4px;padding:8px 20px 0;background:#fff">
          <button data-act="panelTab" data-tab="hilo" style="${subtab(S.chatPanelTab === 'hilo')}">Conversación</button>
          <button data-act="panelTab" data-tab="notas" style="${subtab(S.chatPanelTab === 'notas')}">Notas</button>
        </div>

        ${S.chatPanelTab === 'hilo' ? `
        <div id="hilo" style="flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:10px"></div>
        <div style="border-top:1px solid #E1E6E2;background:#fff;padding:12px 16px;display:flex;gap:10px;align-items:flex-end;position:relative">
          <button data-act="qrToggle" title="Respuestas rápidas" style="width:42px;height:42px;border-radius:10px;border:1px solid #E1E6E2;background:#F7F9F7;cursor:pointer;font-size:13px;font-weight:700;flex-shrink:0">⚡</button>
          <div id="qrPop" style="display:none;position:absolute;bottom:58px;left:16px;width:300px;max-height:280px;overflow-y:auto;background:#fff;border:1px solid #E1E6E2;border-radius:12px;box-shadow:0 8px 24px rgba(20,30,25,.14);z-index:20"></div>
          <textarea id="composer" data-input="composer" data-key="composer" placeholder="Escribí una respuesta…" style="flex:1;resize:none;height:44px;padding:10px 12px;border-radius:10px;border:1px solid #E1E6E2;background:#F7F9F7;font-size:13px;outline:none">${esc(S.composerText)}</textarea>
          <button data-act="send" id="btnEnviar" style="background:#0E7C4A;color:#fff;border:none;padding:0 18px;height:44px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;flex-shrink:0">Enviar</button>
        </div>` : `
        <div id="notasLista" style="flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:10px"></div>
        <div style="border-top:1px solid #E1E6E2;background:#fff;padding:12px 16px;display:flex;gap:10px">
          <textarea id="notaTexto" data-input="note" placeholder="Nota interna (no la ve el cliente)…" style="flex:1;resize:none;height:40px;padding:8px 10px;border-radius:10px;border:1px solid #F0E2B8;background:#FFFDF5;font-size:12.5px;outline:none">${esc(S.noteText)}</textarea>
          <button data-act="addNote" style="background:#C79A2E;color:#fff;border:none;padding:0 16px;border-radius:10px;cursor:pointer;font-size:12.5px;font-weight:700">Guardar</button>
        </div>`}`;

      return `
      <div style="flex:1;display:flex;overflow:hidden">
        <div style="width:340px;min-width:300px;border-right:1px solid #E1E6E2;display:flex;flex-direction:column;background:#fff">
          <div style="padding:12px 14px;border-bottom:1px solid #E1E6E2">
            <input data-input="chatTagFilter" value="${esc(S.chatTagFilter)}" placeholder="Filtrar por etiqueta…" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #E1E6E2;background:#F7F9F7;font-size:12.5px;outline:none"/>
          </div>
          <div style="display:flex;gap:5px;padding:10px 12px;border-bottom:1px solid #E1E6E2;flex-wrap:wrap">
            <button data-act="chatTab" data-tab="humano" style="${tabChatStyle(S.chatTab === 'humano')}">Esperan persona</button>
            <button data-act="chatTab" data-tab="mias" style="${tabChatStyle(S.chatTab === 'mias')}">Mías</button>
            <button data-act="chatTab" data-tab="sin_asignar" style="${tabChatStyle(S.chatTab === 'sin_asignar')}">Sin asignar</button>
            <button data-act="chatTab" data-tab="todas" style="${tabChatStyle(S.chatTab === null)}">Todas</button>
          </div>
          <div id="chatList" style="flex:1;overflow-y:auto"></div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;min-width:0;background:#F9FAF9">${panel}</div>
      </div>`;
    }

    // ── Inventario (maqueta) ──
    function carGridHTML() {
      let lista = S.cars;
      const q = S.carFilterText ? S.carFilterText.trim().toLowerCase() : '';
      if (q) lista = lista.filter((c) => (c.marca + ' ' + c.modelo).toLowerCase().includes(q));
      if (S.carFilterDisp) lista = lista.filter((c) => c.disponibilidad === S.carFilterDisp);
      if (S.carFilterPub === 'pub') lista = lista.filter((c) => c.publicado);
      if (S.carFilterPub === 'draft') lista = lista.filter((c) => !c.publicado);
      if (!lista.length) return '<div style="text-align:center;color:#98A199;font-size:13px;padding:40px;grid-column:1/-1">No hay vehículos con este filtro.</div>';
      return lista.map((car) => {
        const d = DISP[car.disponibilidad];
        return `
        <div class="card" style="overflow:hidden;display:flex;flex-direction:column;border-radius:14px">
          <div style="height:150px;background:#F0F2F0"><div class="foto-slot">Foto del vehículo</div></div>
          <div style="padding:14px 16px;display:flex;flex-direction:column;gap:8px;flex:1">
            <div>
              <div style="font-weight:800;font-size:14px">${esc(car.marca)} ${esc(car.modelo)}</div>
              <div style="font-size:11.5px;color:#667169">${esc(car.version)}</div>
            </div>
            <div style="display:flex;gap:5px;flex-wrap:wrap">
              <span class="pill-muted">${esc(car.anio)}</span>
              <span class="pill-muted">${fmtKm(car.km)}</span>
              <span class="pill-muted">${esc(car.transmision)}</span>
              <span class="pill-muted">${esc(car.combustible)}</span>
            </div>
            <div style="font-size:17px;font-weight:800">${fmtMoney(car.precio, car.moneda)}</div>
            <div style="display:flex;gap:5px">
              <span class="pill" style="${pillStyle(d.bg, d.color)}">${d.label}</span>

    // ═══════════════════ Acciones ═══════════════════
    async function refrescarConvActiva() {
      try {
        await cargarConvs();
        await cargarChatList();
      } catch (e) {}
      pintarNav();
      pintarChatList();
      pintarHeaderConv();
    }

    const A = {
      nav(d) {
        S.view = d.view;
        if (d.view === 'team') { cargarAtajos().then(render); return; }
        render();
        if (d.view === 'chats') { cargarChatList().then(pintarChatList); if (S.selectedConvId) cargarHilo(); }
      },
      logout: async () => {
        try { await api('/api/backoffice/logout', { method: 'POST' }); } catch (e) {}
        S.selectedConvId = null;
        mostrarLogin();
      },
      openConv(d) { S.view = 'chats'; A.selConv(d); },

      // ── Chats (backend real) ──
      chatTab(d) {
        S.chatTab = d.tab === 'todas' ? null : d.tab;
        render();
        cargarChatList().then(pintarChatList);
      },
      selConv(d) {
        S.selectedConvId = d.id;
        S.chatPanelTab = 'hilo';
        S.mensajes = [];
        render();
        cargarHilo();
      },
      assign: async (d, el) => {
        try {
          await api('/api/backoffice/asignar', { method: 'POST', body: JSON.stringify({ convId: S.selectedConvId, agenteId: el.value ? Number(el.value) : null }) });
          el.blur();
          await refrescarConvActiva();
        } catch (e) { alert('No se pudo asignar: ' + e.message); }
      },
      valorar: async (d) => {
        const conv = convActiva();
        if (!conv) return;
        try {
          const nuevo = conv.valoracion === d.v ? null : d.v;
          await api('/api/backoffice/valoracion', { method: 'POST', body: JSON.stringify({ convId: conv.convId, valoracion: nuevo }) });
          await refrescarConvActiva();
        } catch (e) { alert('No se pudo guardar la valoración: ' + e.message); }
      },
      resolver: async () => {
        try {
          await api('/api/backoffice/resolver', { method: 'POST', body: JSON.stringify({ convId: S.selectedConvId }) });
          await refrescarConvActiva();
        } catch (e) { alert('No se pudo actualizar: ' + e.message); }
      },
      delTag: async (d) => {
        try {
          await cargarConvs(); // releemos para no pisar etiquetas de otro agente
          const restantes = etiquetasDe(convActiva()).filter((t) => t !== d.tag);
          await api('/api/backoffice/etiquetas', { method: 'POST', body: JSON.stringify({ convId: S.selectedConvId, etiquetas: restantes }) });
          await refrescarConvActiva();
        } catch (e) { alert('No se pudo quitar la etiqueta: ' + e.message); }
      },
      panelTab(d) {
        S.chatPanelTab = d.tab;
        render();
        if (d.tab === 'notas') cargarNotas();
        else cargarHilo();
      },
      qrToggle: async () => {
        const pop = document.getElementById('qrPop');
        if (!pop) return;
        if (pop.style.display === 'block') { pop.style.display = 'none'; return; }
        await cargarAtajos();
        pop.innerHTML = ((S.atajos || []).length
          ? S.atajos.map((q) => `
            <div class="hover-suave" data-act="qrUse" data-id="${q.id}" style="padding:10px 14px;border-bottom:1px solid #F0F2F0;cursor:pointer">
              <div style="font-weight:700;font-size:12px;color:#0E7C4A">${esc(q.clave)}</div>
              <div class="recorte" style="font-size:11.5px;color:#667169">${esc(q.texto)}</div>
            </div>`).join('')
          : '<div style="padding:10px 14px;font-size:11.5px;color:#98A199">Todavía no cargaste respuestas rápidas.</div>') +
          '<div data-act="qrManage" style="padding:10px 14px;text-align:center;font-size:11.5px;color:#667169;cursor:pointer">Gestionar respuestas rápidas</div>';
        pop.style.display = 'block';
      },
      qrUse(d) {
        const q = (S.atajos || []).find((x) => x.id === Number(d.id));
        const ta = document.getElementById('composer');
        const pop = document.getElementById('qrPop');
        if (q && ta) { ta.value = q.texto; S.composerText = q.texto; ta.focus(); }
        if (pop) pop.style.display = 'none';
      },
      qrManage() { S.view = 'team'; cargarAtajos().then(render); },
      send: async () => {
        const ta = document.getElementById('composer');
        const btn = document.getElementById('btnEnviar');
        const texto = (ta ? ta.value : '').trim();
        if (!texto || !S.selectedConvId) return;
        if (btn) btn.disabled = true;
        try {
          await api('/api/backoffice/responder', { method: 'POST', body: JSON.stringify({ convId: S.selectedConvId, texto }) });
          if (ta) ta.value = '';
          S.composerText = '';
          await cargarHilo();
          await refrescarConvActiva();
        } catch (e) {
          alert('No se pudo enviar: ' + e.message);
        } finally {
          if (btn) btn.disabled = false;
        }
      },
      addNote: async () => {
        const ta = document.getElementById('notaTexto');
        const texto = (ta ? ta.value : '').trim();
        if (!texto || !S.selectedConvId) return;
        try {
          await api('/api/backoffice/notas', { method: 'POST', body: JSON.stringify({ convId: S.selectedConvId, texto }) });
          if (ta) ta.value = '';
          S.noteText = '';
          await cargarNotas();
        } catch (e) { alert('No se pudo guardar la nota: ' + e.message); }
      },

      // ── Respuestas rápidas (Equipo, backend real) ──
      qrDel: async (d) => {
        try {
          await api('/api/backoffice/atajos/' + Number(d.id), { method: 'DELETE' });
          await cargarAtajos(true);
          render();
        } catch (e) { alert('No se pudo borrar: ' + e.message); }
      },
      qrAdd: async () => {
        const clave = val('nuevaRespClave'), texto = val('nuevaRespTexto');
        const negocio = document.getElementById('nuevaRespScope').value || null;
        if (!clave || !texto) return;
        try {
          await api('/api/backoffice/atajos', { method: 'POST', body: JSON.stringify({ clave, texto, negocio }) });
          await cargarAtajos(true);
          render();
        } catch (e) { alert('No se pudo crear: ' + e.message); }
      },

      // ── Inventario (maqueta) ──
      carFilterDisp(d, el) { S.carFilterDisp = el.value; render(); },
      carFilterPub(d, el) { S.carFilterPub = el.value; render(); },
      carAdd() { S.modal = { tipo: 'car', id: null }; renderModal(); },
      carEdit(d) { S.modal = { tipo: 'car', id: Number(d.id) }; renderModal(); },
      carPub(d) {
        const c = S.cars.find((x) => x.id === Number(d.id));
        if (c) c.publicado = !c.publicado;
        render();
      },
      carDel(d) {
        if (!window.confirm('¿Borrar este vehículo del inventario?')) return;
        S.cars = S.cars.filter((x) => x.id !== Number(d.id));
        render();
      },
      carSave() {
        const marca = val('m-marca'), modelo = val('m-modelo');
        if (!marca || !modelo) return;
        const datos = {
          marca, modelo, version: val('m-version'),
          anio: Number(val('m-anio')) || '', km: Number(val('m-km')) || 0,
          transmision: val('m-transmision'), combustible: val('m-combustible'),
          precio: Number(val('m-precio')) || 0, moneda: val('m-moneda'),
          disponibilidad: val('m-disponibilidad'),
          publicado: document.getElementById('m-publicado').checked,
        };
        const id = S.modal.id;
        if (id) Object.assign(S.cars.find((x) => x.id === id), datos);
        else S.cars.push({ ...datos, id: proximoId(S.cars), vistas: 0, consultas: 0 });
        S.modal = null;
        render();
      },

      // ── Leads (maqueta) ──
      leadAdd() { S.modal = { tipo: 'lead', id: null }; renderModal(); },
      leadEdit(d) { S.modal = { tipo: 'lead', id: Number(d.id) }; renderModal(); },
      leadMove(d) {
        const l = S.leads.find((x) => x.id === Number(d.id));
        if (!l) return;
        const idx = STAGES.findIndex((st) => st.key === l.etapa);
        const destino = Math.min(STAGES.length - 1, Math.max(0, idx + Number(d.dir)));
        l.etapa = STAGES[destino].key;
        render();
      },
      leadDel(d) {
        if (!window.confirm('¿Borrar este lead?')) return;
        S.leads = S.leads.filter((x) => x.id !== Number(d.id));
        render();
      },
      leadSave() {
        const nombre = val('m-nombre');
        if (!nombre) return;
        const datos = { nombre, telefono: val('m-telefono'), interes: val('m-interes'), origen: val('m-origen'), agente: val('m-agente'), etapa: val('m-etapa') };
        const id = S.modal.id;
        if (id) Object.assign(S.leads.find((x) => x.id === id), datos);
        else S.leads.push({ ...datos, id: proximoId(S.leads), fecha: diaISO(0) });
        S.modal = null;
        render();
      },

      // ── Turnos (maqueta) ──
      apptAdd() { S.modal = { tipo: 'appt', id: null }; renderModal(); },
      apptEdit(d) { S.modal = { tipo: 'appt', id: Number(d.id) }; renderModal(); },
      apptStatus(d, el) {
        const a = S.appointments.find((x) => x.id === Number(d.id));
        if (a) a.estado = el.value;
        render();
      },
      apptDel(d) {
        if (!window.confirm('¿Borrar este turno?')) return;
        S.appointments = S.appointments.filter((x) => x.id !== Number(d.id));
        render();
      },
      apptSave() {
        const cliente = val('m-cliente');
        if (!cliente) return;
        const datos = { fecha: val('m-fecha'), hora: val('m-hora'), cliente, vehiculo: val('m-vehiculo'), agente: val('m-agente') };
        const id = S.modal.id;
        if (id) Object.assign(S.appointments.find((x) => x.id === id), datos);
        else S.appointments.push({ ...datos, id: proximoId(S.appointments), estado: 'programado' });
        S.modal = null;
        render();
      },

      // ── Tomas de usado (maqueta) ──
      tiAdd() { S.modal = { tipo: 'tradein', id: null }; renderModal(); },
      tiEdit(d) { S.modal = { tipo: 'tradein', id: Number(d.id) }; renderModal(); },
      tiStatus(d, el) {
        const t = S.tradeins.find((x) => x.id === Number(d.id));
        if (t) t.estado = el.value;
        render();
      },
      tiDel(d) {
        if (!window.confirm('¿Borrar esta toma de usado?')) return;
        S.tradeins = S.tradeins.filter((x) => x.id !== Number(d.id));
        render();
      },
      tiSave() {
        const cliente = val('m-cliente');
        if (!cliente) return;
        const datos = {
          cliente, telefono: val('m-telefono'), marca: val('m-marca'), modelo: val('m-modelo'),
          anio: Number(val('m-anio')) || '', km: Number(val('m-km')) || 0,
          valorEstimado: Number(val('m-valor')) || 0, estado: val('m-estado'),
          nota: document.getElementById('m-nota').value.trim(),
        };
        const id = S.modal.id;
        if (id) Object.assign(S.tradeins.find((x) => x.id === id), datos);
        else S.tradeins.push({ ...datos, id: proximoId(S.tradeins) });
        S.modal = null;
        render();
      },

      modalClose() { S.modal = null; renderModal(); },
    };

    // ═══════════════════ Eventos (delegación) ═══════════════════
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-act]');
      if (!el) return;
      // El fondo del modal cierra, pero un click dentro de la caja no.
      if (el.classList.contains('modal-fondo') && e.target.closest('[data-modal-caja]')) return;
      if (el.tagName === 'SELECT') return; // los selects actúan en 'change'
      A[el.dataset.act](el.dataset, el, e);
    });

    document.addEventListener('change', (e) => {
      const el = e.target.closest('select[data-act]');
      if (el) A[el.dataset.act](el.dataset, el, e);
    });

    let _debounceEtiqueta;
    document.addEventListener('input', (e) => {
      const el = e.target.closest('[data-input]');
      if (!el) return;
      const cual = el.dataset.input;
      if (cual === 'chatTagFilter') {
        S.chatTagFilter = el.value;
        clearTimeout(_debounceEtiqueta);
        _debounceEtiqueta = setTimeout(() => cargarChatList().then(pintarChatList), 300);
      } else if (cual === 'carFilterText') {
        S.carFilterText = el.value;
        const grid = document.getElementById('carGrid');
        if (grid) grid.innerHTML = carGridHTML();
      } else if (cual === 'composer') {
        S.composerText = el.value;
      } else if (cual === 'note') {
        S.noteText = el.value;
      }
    });

    document.addEventListener('keydown', (e) => {
      const el = e.target.closest('[data-key]');
      if (!el) {
        if (e.key === 'Escape' && S.modal) A.modalClose();
        return;
      }
      if (el.dataset.key === 'composer' && e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        A.send();
      } else if (el.dataset.key === 'tag' && e.key === 'Enter' && el.value.trim()) {
        e.preventDefault();
        const tag = el.value.trim();
        el.value = '';
        (async () => {
          try {
            await cargarConvs(); // releemos para no pisar etiquetas de otro agente
            const set = new Set(etiquetasDe(convActiva()));
            set.add(tag);
            await api('/api/backoffice/etiquetas', { method: 'POST', body: JSON.stringify({ convId: S.selectedConvId, etiquetas: [...set] }) });
            await refrescarConvActiva();
          } catch (err) { alert('No se pudo guardar la etiqueta: ' + err.message); }
        })();
      }
    });

    // ¿Ya había sesión activa? Probamos con /me; si responde entramos directo,
    // si no (401 o red caída) queda la pantalla de login.
    api('/api/backoffice/me').then((d) => mostrarApp(d.agente)).catch(() => mostrarLogin());
  </script>
</body>
